}

// ── Transaction detail sheet (feedback entry; no split / re-categorise) ──
function TxnDetailSheet({ T, txn, open, onClose, showLogos, onImprove }) {
  const cat = txn ? window.EXP_DATA.CATEGORIES.find((c) => c.id === txn.categoryId) : null;
  return (
    <Sheet T={T} open={open} onClose={onClose} title="Transaction" z={340}>
      {txn && (
        <div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '6px 0 20px' }}>
            <MerchantMark name={txn.merchant} glyph={txn.glyph} catColor={txn.categoryColor} showLogos={showLogos} dark={T.dark} size={64} radius={18} />
            <div style={{ fontSize: 18, fontWeight: 680, color: T.ink, marginTop: 14, letterSpacing: '-0.01em' }}>{txn.merchant}</div>
            <div style={{ fontSize: 32, fontWeight: 720, color: T.ink, marginTop: 6, letterSpacing: '-0.03em', fontVariantNumeric: 'tabular-nums' }}>
              <span style={{ display: 'inline-flex', color: T.muted, marginRight: 6 }}><Dirham size={19} color="currentColor" /></span>{fmtAED(txn.amount, true)}
            </div>
            <div style={{ fontSize: 13.5, color: T.muted, marginTop: 6 }}>{txn.date}</div>
          </div>
          <Card T={T} pad="2px 18px">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '13px 0', position: 'relative' }}>
              <span style={{ fontSize: 14.5, color: T.muted }}>Category</span>
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 7, fontSize: 14, fontWeight: 560, color: cat.color, background: hexA(cat.color, T.dark ? 0.2 : 0.1), padding: '4px 10px', borderRadius: 999 }}>
                <CatGlyph glyph={cat.glyph} size={14} color={cat.color} />{cat.name}
              </span>
              <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, height: 1, background: T.faint }} />
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '13px 0' }}>
              <span style={{ fontSize: 14.5, color: T.muted }}>Date</span>
              <span style={{ fontSize: 14.5, color: T.ink, fontWeight: 560 }}>{txn.date}</span>

          {/* Enrichment feedback — the real Lune capability (TransactionDetailView onUpdate) */}

            marginTop: 12, padding: '14px 15px', borderRadius: 16, background: hexA(T.accent, T.dark ? 0.14 : 0.08), border: `1px solid ${hexA(T.accent, 0.28)}`, color: T.ink }}>
            <span style={{ width: 38, height: 38, borderRadius: 11, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: T.accent, color: '#fff' }}>
              <UIIcon name="sparkles" size={20} stroke="#fff" />
            </span>
            <span style={{ flex: 1 }}>
              <span style={{ display: 'block', fontSize: 15, fontWeight: 600 }}>Improve brand name, logo or category</span>
              <span style={{ display: 'block', fontSize: 12.5, color: T.muted, marginTop: 2 }}>Suggest a fix — it trains Lune's enrichment</span>

          </button>
        </div>
      )}

// Date-range picker: quick presets + a tap-to-select calendar (start → end).
function PeriodSheet({ T, open, onClose, period, onPick }) {
  const { PERIOD_PRESETS, makePeriod, ANCHOR_MS } = window.EXP_DATA;
  const anchor = new Date(ANCHOR_MS);
  const monthStart = (d) => new Date(d.getFullYear(), d.getMonth(), 1);
  const [view, setView] = React.useState(() => monthStart(anchor));
  const [start, setStart] = React.useState(period ? period.startMs : null);
  const [end, setEnd] = React.useState(period ? period.endMs : null);

  React.useEffect(() => { if (open) { setStart(period ? period.startMs : null); setEnd(period ? period.endMs : null); setView(monthStart(period ? new Date(period.endMs) : anchor)); } }, [open]);

  const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  const DOW = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
  const y = view.getFullYear(), m = view.getMonth();
  const firstDow = new Date(y, m, 1).getDay();
  const numDays = new Date(y, m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= numDays; d++) cells.push(d);

  const lo = start != null && end != null ? Math.min(start, end) : start;
  const hi = start != null && end != null ? Math.max(start, end) : start;
  const dayMs = (d) => +new Date(y, m, d);

  const tapDay = (d) => {
    const ms = dayMs(d);
    if (ms > ANCHOR_MS) return;
    if (start == null || end != null) { setStart(ms); setEnd(null); }
    else if (ms < start) { setEnd(start); setStart(ms); }
    else setEnd(ms);
  };
  const applyPreset = (p) => { setStart(p.period.startMs); setEnd(p.period.endMs); setView(monthStart(new Date(p.period.endMs))); };
  const apply = () => { const s = start, e = end != null ? end : start; if (s == null) return; onPick(makePeriod(Math.min(s, e), Math.max(s, e))); onClose(); };
  const prevMonth = () => setView(new Date(y, m - 1, 1));
  const nextMonth = () => { const nv = new Date(y, m + 1, 1); if (nv <= monthStart(anchor)) setView(nv); };
  const atLatest = y === anchor.getFullYear() && m === anchor.getMonth();
  const summary = start == null ? 'Select a start date' : (end == null ? makePeriod(start, start).label + ' — pick end date' : makePeriod(lo, hi).label);
  const navBtn = (dir, disabled, onClick) => (
    <button onClick={disabled ? undefined : onClick} disabled={disabled} style={{ width: 34, height: 34, borderRadius: 999, border: `1px solid ${T.line}`, background: T.surface, color: T.ink, cursor: disabled ? 'default' : 'pointer', opacity: disabled ? 0.35 : 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <UIIcon name={dir} size={18} stroke={T.ink} />
    </button>
  );

  return (
    <Sheet T={T} open={open} onClose={onClose} title="Select dates" z={360}>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 }}>
        {PERIOD_PRESETS.map((p) => {
          const active = period && period.days === p.period.days;
          return (
            <button key={p.key} onClick={() => applyPreset(p)} style={{ border: `1px solid ${active ? 'transparent' : T.line}`, borderRadius: 999, padding: '7px 12px', cursor: 'pointer', background: active ? T.accent : T.surface, color: active ? '#fff' : T.ink, fontSize: 12.5, fontWeight: 580, fontFamily: 'inherit' }}>{p.key}</button>
          );
        })}
      </div>

      <Card T={T} pad={16}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          {navBtn('chevL', false, prevMonth)}
          <div style={{ fontSize: 15.5, fontWeight: 680, color: T.ink }}>{MONTHS[m]} {y}</div>
          {navBtn('chevR', atLatest, nextMonth)}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 2 }}>
          {DOW.map((d, i) => <div key={'h' + i} style={{ textAlign: 'center', fontSize: 11, fontWeight: 600, color: T.muted, paddingBottom: 6 }}>{d}</div>)}
          {cells.map((d, i) => {
            if (d == null) return <div key={'e' + i} />;
            const ms = dayMs(d);
            const future = ms > ANCHOR_MS;
            const isEnd = ms === lo || ms === hi;
            const within = lo != null && hi != null && ms >= lo && ms <= hi;
            return (
              <button key={'d' + i} onClick={() => tapDay(d)} disabled={future} style={{
                height: 38, border: 'none', cursor: future ? 'default' : 'pointer', fontFamily: 'inherit',
                fontSize: 13.5, fontWeight: isEnd ? 680 : 500,
                background: isEnd ? T.accent : within ? hexA(T.accent, T.dark ? 0.28 : 0.14) : 'transparent',
                color: isEnd ? '#fff' : future ? T.muted : T.ink, opacity: future ? 0.3 : 1,
                borderRadius: isEnd ? 999 : within ? 8 : 999,
              }}>{d}</button>
            );
          })}
        </div>
      </Card>

      <div style={{ textAlign: 'center', fontSize: 13, color: T.muted, margin: '14px 0', fontVariantNumeric: 'tabular-nums' }}>{summary}</div>
      <button onClick={apply} disabled={start == null} style={{ width: '100%', padding: '14px 0', borderRadius: 14, border: 'none', cursor: start == null ? 'default' : 'pointer', background: start == null ? hexA(T.accent, 0.4) : T.accent, color: '#fff', fontSize: 15, fontWeight: 620, fontFamily: 'inherit' }}>Apply</button>
    </Sheet>
  );
}

// ── Region picker — the first question when entering the app. Localises
// brands, language and currency; Asia fans out to Japan / Malaysia / Singapore.
function RegionPicker({ T, open, onClose, onPick }) {
  const [step, setStep] = React.useState('region');
  React.useEffect(() => { if (open) setStep('region'); }, [open]);
  const row = (key, flag, title, sub, onClick) => (
    <button key={key} className="pressable-row" onClick={onClick} style={{
      display: 'flex', alignItems: 'center', gap: 13, width: '100%', padding: '13px 14px', borderRadius: 16,
      border: `1px solid ${T.line}`, background: T.surface, cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left', marginBottom: 10,
    }}>
      <span style={{ fontSize: 26, lineHeight: 1 }}>{flag}</span>
      <span style={{ flex: 1, minWidth: 0 }}>
        <span style={{ display: 'block', fontSize: 15.5, fontWeight: 650, color: T.ink }}>{title}</span>
        <span style={{ display: 'block', fontSize: 12.5, color: T.muted, marginTop: 2 }}>{sub}</span>
      </span>
      <UIIcon name="chevR" size={16} stroke={T.muted} />
    </button>
  );
  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 380, pointerEvents: open ? 'auto' : 'none' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.4)', opacity: open ? 1 : 0, transition: 'opacity .3s' }} />
      <div style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, background: T.bg,
        borderTopLeftRadius: 28, borderTopRightRadius: 28, padding: '22px 18px 26px',
        transform: open ? 'translateY(0)' : 'translateY(102%)', transition: 'transform .42s cubic-bezier(.22,1,.36,1)',
        boxShadow: '0 -10px 40px rgba(0,0,0,0.25)',
      }}>
        {step === 'region' ? (
          <React.Fragment>
            <div style={{ fontSize: 19, fontWeight: 700, color: T.ink, letterSpacing: '-0.02em' }}>Where is your bank?</div>
            <div style={{ fontSize: 13, color: T.muted, margin: '6px 0 16px', lineHeight: 1.5 }}>The app localises brands, language and currency to your market.</div>
            {row('me', '🌍', 'Middle East', 'Global brands · AED', () => onPick('me'))}
            {row('eu', '🇪🇺', 'Europe', 'European brands · EUR €', () => onPick('eu'))}
            {row('asia', '🌏', 'Asia', 'Japan · Malaysia · Singapore', () => setStep('asia'))}
            {row('za', '🇿🇦', 'South Africa', 'South African brands · ZAR R', () => onPick('za'))}
          </React.Fragment>
        ) : (
          <React.Fragment>
            <button className="pressable" onClick={() => setStep('region')} style={{
              display: 'inline-flex', alignItems: 'center', gap: 5, padding: '7px 12px 7px 9px', borderRadius: 999,
              border: `1px solid ${T.line}`, background: T.surface, cursor: 'pointer', fontFamily: 'inherit',
              fontSize: 12.5, fontWeight: 620, color: T.ink, marginBottom: 12,
            }}><UIIcon name="chevL" size={14} stroke="currentColor" />Regions</button>
            <div style={{ fontSize: 19, fontWeight: 700, color: T.ink, letterSpacing: '-0.02em', marginBottom: 16 }}>Choose your market</div>
            {row('jp', '🇯🇵', 'Japan', '日本のブランド · JPY ¥', () => onPick('jp'))}
            {row('my', '🇲🇾', 'Malaysia', 'Malaysian brands · MYR RM', () => onPick('my'))}
            {row('sg', '🇸🇬', 'Singapore', 'Singaporean brands · SGD S$', () => onPick('sg'))}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

// ── Card-type filter — aggregated view or a single card's spend ─────
function CardTypeSheet({ T, open, onClose, value, onPick }) {
  const OPTS = [
    ['all', 'All cards', 'Aggregated across every account'],
    ['debit', 'Debit card', 'Everyday spending'],
    ['credit', 'Credit card', 'Travel, shopping & subscriptions'],
    ['savings', 'Savings account', 'Bills, loans & standing orders'],
  ];
  return (
    <Sheet T={T} open={open} onClose={onClose} title="Card type" z={350}>
      {OPTS.map(([k, label, sub]) => {
        const active = value === k;
        return (
          <button key={k} className="pressable-row" onClick={() => { onPick(k); onClose(); }} style={{
            display: 'flex', alignItems: 'center', gap: 13, width: '100%', padding: '13px 14px', borderRadius: 16,
            border: `1.5px solid ${active ? T.accent : T.line}`, background: active ? hexA(T.accent, T.dark ? 0.14 : 0.07) : T.surface,
            cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left', marginBottom: 10,
          }}>
            <span style={{ width: 38, height: 38, borderRadius: 11, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: hexA(T.accent, T.dark ? 0.2 : 0.11), color: T.accent }}>
              <WalletIcon size={19} stroke={T.accent} />
            </span>
            <span style={{ flex: 1, minWidth: 0 }}>
              <span style={{ display: 'block', fontSize: 15, fontWeight: 640, color: T.ink }}>{label}</span>
              <span style={{ display: 'block', fontSize: 12.5, color: T.muted, marginTop: 2 }}>{sub}</span>
            </span>
            {active && <span style={{ fontSize: 16, fontWeight: 700, color: T.accent }}>✓</span>}
          </button>
        );
      })}
    </Sheet>
  );
}

Object.assign(window, { SearchField, TxnDetailSheet, PeriodSheet, RegionPicker, CardTypeSheet });

</script>

<script type="text/babel" data-presets="react">
/* screens.jsx — SwiftUI-faithful Expenses (LuneSDK).
   Mirrors the real module: one Spends screen (ExpenseView) with a donut
   (ExpenseChart), a side-by-side Category Trends + Brand Trends button pair
   (buildTrendButtons), and a transactions list. Everything else — the Spend
   Categories breakdown (ExpenseBreakdown), Category Trends, Brand Trends,
   per-category transactions and transaction detail — is presented as a SHEET,
   exactly as SwiftUI's .sheet(...) modifiers do. */

const D = () => window.EXP_DATA;

// arrow.forward (straight arrow, matches SF Symbol used in the trend buttons)
function ArrowFwd({ size = 15, stroke, sw = 2 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{ display: 'block' }}>
      <path d="M4 12h15M13 6l6 6-6 6" stroke={stroke} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// wallet.bifold (SF Symbol used on the Brand Trends button)
function WalletIcon({ size = 18, stroke, sw = 1.8 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{ display: 'block' }}>
      <rect x="3" y="6" width="18" height="13" rx="3" stroke={stroke} strokeWidth={sw} />
      <path d="M3 10h18" stroke={stroke} strokeWidth={sw} strokeLinecap="round" />
      <circle cx="16.5" cy="14.5" r="1.4" fill={stroke} />
    </svg>
  );
}

// ── SpendRing — clean bold segmented ring with the total + delta in the
//    centre. Each segment is labelled with its category NAME and % right on
//    the ring (quadrant-anchored, width-clamped so it never clips), and a
//    single tap opens that category — no reveal-then-open double tap.
function SpendRing({ data, total, prevTotal, dark, ink, muted, surface, onSlice }) {
  const [hover, setHover] = React.useState(null);
  const W = 180, H = 180, cx = 90, cy = 90, R = 70, stroke = 19, gapDeg = 4;

  const sorted = [...data].sort((a, b) => b.total - a.total);
  const topN = sorted.slice(0, 5);
  const restTotal = sorted.slice(5).reduce((s, c) => s + c.total, 0);
  const segsData = restTotal > 0
    ? [...topN, { id: '__other', name: 'Other', color: dark ? '#4A4F55' : '#C9CFCC', glyph: '__dots', total: restTotal, other: true }]
    : topN;

  const polar = (r, deg) => { const a = (deg - 90) * Math.PI / 180; return [cx + r * Math.cos(a), cy + r * Math.sin(a)]; };
  const arc = (r, s, e) => { const [sx, sy] = polar(r, s); const [ex, ey] = polar(r, e); const large = (e - s) > 180 ? 1 : 0; return `M ${sx} ${sy} A ${r} ${r} 0 ${large} 1 ${ex} ${ey}`; };

  let cum = 0;
  const segs = segsData.map((d) => { const sweep = (d.total / total) * 360; const seg = { ...d, start: cum, end: cum + sweep, mid: cum + sweep / 2, pct: Math.round((d.total / total) * 100) }; cum += sweep; return seg; });
  const open = (s) => onSlice && onSlice(s.other ? '__other' : s.id);

  const delta = prevTotal ? Math.round(((total - prevTotal) / prevTotal) * 100) : null;
  const up = delta != null && delta >= 0;

  return (
    <div>
    <div style={{ position: 'relative', width: W, height: H, margin: '0 auto' }}>
      <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ display: 'block' }}>
        {segs.map((s) => {
          const dim = hover != null && hover !== s.id;
          return (
            <path key={s.id} d={arc(R, s.start + gapDeg / 2, s.end - gapDeg / 2)} fill="none"
              stroke={s.color} strokeWidth={hover === s.id ? stroke + 4 : stroke} strokeLinecap="round"
              opacity={dim ? 0.4 : 1} onClick={() => open(s)}
              onMouseEnter={() => setHover(s.id)} onMouseLeave={() => setHover(null)}
              style={{ transition: 'opacity .2s var(--ease-out), stroke-width .18s var(--ease-out)', cursor: 'pointer' }} />
          );
        })}
      </svg>

      {/* centre: just the total — two calm lines, no crowding */}
      <div style={{ position: 'absolute', left: 0, right: 0, top: cy, transform: 'translateY(-50%)', display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', pointerEvents: 'none' }}>
        <div style={{ fontSize: 10.5, fontWeight: 680, letterSpacing: '0.09em', textTransform: 'uppercase', color: muted }}>Total spent</div>
        {(() => {
          const disp = total * ((window.CURRENT_REGION || {}).rate || 1);
          const fs = disp >= 1000000 ? 20 : disp >= 100000 ? 24 : 29;
          return (
            <div style={{ fontSize: fs, fontWeight: 730, color: ink, marginTop: 5, letterSpacing: '-0.035em', fontVariantNumeric: 'tabular-nums', lineHeight: 1 }}>
              <span style={{ display: 'inline-flex', color: muted, marginRight: 4 }}><Dirham size={fs * 0.58} color="currentColor" /></span>{fmtAED(total)}
            </div>
          );
        })()}
      </div>

    </div>

    {/* Color-keyed legend — the dot ties each heading to its slice, so the
        headings can never mis-point the way de-collided callouts did when
        several small slices clustered on one side of the ring. */}
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, minmax(0, 1fr))', gap: '4px 20px', margin: '16px 4px 0' }}>
      {segs.map((s) => {
        const dim = hover != null && hover !== s.id;
        return (
          <button key={'lg' + s.id} className="pressable-row" onClick={() => open(s)}
            onMouseEnter={() => setHover(s.id)} onMouseLeave={() => setHover(null)}
            style={{
              display: 'flex', alignItems: 'center', gap: 8, minWidth: 0, padding: '4px 0',
              border: 'none', background: 'transparent', cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left',
              opacity: dim ? 0.4 : 1, transition: 'opacity .2s',
            }}>
            <span style={{ width: 10, height: 10, borderRadius: 3.5, background: s.color, flexShrink: 0 }} />
            <span style={{ fontSize: 12.5, fontWeight: 600, color: ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', minWidth: 0 }}>{s.name}</span>
            <span style={{ fontSize: 12, fontWeight: 600, color: muted, fontVariantNumeric: 'tabular-nums', marginLeft: 'auto', flexShrink: 0 }}>{s.pct}%</span>
          </button>
        );
      })}
    </div>
    {delta != null && (
      <div style={{ display: 'flex', justifyContent: 'center', marginTop: 12 }}>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '4px 11px', borderRadius: 999, fontSize: 12, fontWeight: 640, whiteSpace: 'nowrap', fontVariantNumeric: 'tabular-nums', color: up ? T_POS_INK(dark) : T_NEG_INK(dark), background: up ? T_POS_BG(dark) : T_NEG_BG(dark) }}>
          <UIIcon name={up ? 'arrowUp' : 'arrowDn'} size={12} stroke="currentColor" />{Math.abs(delta)}% vs last period
        </span>
      </div>
    )}
    </div>
  );
}
// tiny theme-token helpers so SpendRing needn't thread the whole T object
function T_POS_INK(d) { return d ? '#FF9DAE' : '#C2402F'; }
function T_POS_BG(d) { return d ? 'rgba(242,96,118,0.16)' : 'rgba(242,96,118,0.10)'; }
function T_NEG_INK(d) { return d ? '#99F2AC' : '#0A634D'; }
function T_NEG_BG(d) { return d ? 'rgba(153,242,172,0.16)' : 'rgba(153,242,172,0.30)'; }

// ── Ranked category row — icon, name, amount, slim proportion bar + %.
//    This is where names live now; it ranks at a glance (the ring can't).
function CategoryRankRow({ T, cat, total, onClick, divider }) {
  const pct = total ? Math.round((cat.total / total) * 100) : 0;
  return (
    <button className="pressable-row" onClick={onClick} style={{
      display: 'flex', alignItems: 'center', gap: 13, width: '100%', padding: '11px 0',
      border: 'none', background: 'transparent', cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left', position: 'relative',
    }}>
      <CategoryMark glyph={cat.glyph} color={cat.color} dark={T.dark} size={38} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 10 }}>
          <span style={{ fontSize: 14.5, fontWeight: 600, color: T.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{cat.name}</span>
          <span style={{ fontSize: 14.5, fontWeight: 600, color: T.ink, fontVariantNumeric: 'tabular-nums', flexShrink: 0 }}><Dirham size={12} color="currentColor" style={{ marginRight: 3 }} />{fmtAED(cat.total)}</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginTop: 8 }}>
          <div style={{ flex: 1, height: 5, borderRadius: 999, background: hexA(cat.color, T.dark ? 0.22 : 0.14), overflow: 'hidden' }}>
            <div style={{ height: '100%', width: `${pct}%`, background: cat.color, borderRadius: 999, transformOrigin: 'left center', animation: 'growX .55s var(--ease-out, cubic-bezier(.23,1,.32,1)) both' }} />
          </div>
          <span style={{ fontSize: 11.5, fontWeight: 600, color: T.muted, fontVariantNumeric: 'tabular-nums', width: 30, textAlign: 'right' }}>{pct}%</span>
        </div>
      </div>
      {divider && <div style={{ position: 'absolute', left: 51, right: 0, bottom: 0, height: 1, background: T.faint }} />}
    </button>
  );
}

// Trend entry — full-width row, single line (no wrapping), tinted icon + caption.
function TrendRow({ T, icon, label, caption, onClick, divider }) {
  return (
    <button className="pressable-row" onClick={onClick} style={{
      display: 'flex', alignItems: 'center', gap: 13, width: '100%', padding: '13px 0',
      border: 'none', background: 'transparent', cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left', position: 'relative',
    }}>
      <span style={{ width: 38, height: 38, borderRadius: 11, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: hexA(T.accent, T.dark ? 0.2 : 0.11), color: T.accent }}>{icon}</span>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 15, fontWeight: 600, color: T.ink, letterSpacing: '-0.01em' }}>{label}</div>
        <div style={{ fontSize: 12.5, color: T.muted, marginTop: 1 }}>{caption}</div>
      </div>
      <UIIcon name="chevR" size={18} stroke={T.muted} />
      {divider && <div style={{ position: 'absolute', left: 51, right: 0, bottom: 0, height: 1, background: T.faint }} />}
    </button>
  );
}

// ── ExpenseView (the "Spends" screen) ───────────────────────────────
// Raw, unenriched bank descriptor — what a statement shows before Lune.
function rawDescriptor(txn) {
  const m = txn.merchant.toUpperCase().replace(/[^A-Z0-9 ]/g, '').replace(/\s+/g, ' ').trim();
  const ref = String((txn.id * 7919) % 900000 + 100000);
  const short = m.replace(/ /g, '').slice(0, 12);
  const fmts = [
    `POS ${ref} ${m} DXB AE`,
    `${short}*${(txn.id * 31) % 9000 + 1000} AE`,
    `MC-DEBIT ${ref} ${m.slice(0, 14)}`,
    `VISADIRECT ${short} ${ref}`,
    `${m.slice(0, 16)} AE*${ref}`,
  ];
  return fmts[txn.id % fmts.length];
}

// The demo's headline control: flip between the raw bank feed and the
// Lune-enriched PFM. Segmented, branded on the "With Lune" side.
function LuneToggle({ T, enriched, onChange }) {
  const seg = (val, content) => {
    const active = enriched === val;
    return (
      <button className="pressable" onClick={() => onChange(val)} style={{
        flex: 1, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 7,
        padding: '10px 0', borderRadius: 11, border: 'none', cursor: 'pointer', fontFamily: 'inherit',
        fontSize: 13.5, fontWeight: 660, color: active ? T.ink : T.muted,
        background: active ? T.surface : 'transparent',
        boxShadow: active ? (T.dark ? `inset 0 0 0 1px ${T.line}` : '0 1px 3px rgba(7,3,18,0.16)') : 'none',
        transition: 'color .15s',
      }}>{content}</button>
    );
  };
  return (
    <div style={{ display: 'flex', gap: 4, padding: 4, borderRadius: 14, background: T.dark ? 'rgba(255,255,255,0.06)' : 'rgba(7,3,18,0.05)' }}>
      {seg(false, 'Enrich transactions')}
      {seg(true, <React.Fragment><LuneMark size={16} disc={T.dark ? '#FFFFFF' : '#002E2A'} crescent={T.accent} />In your app</React.Fragment>)}
    </div>
  );
}

// Curated order for the enrich feed, per region — most-recognisable brands
// first; any remaining merchants from the feed fill the tail up to 24 rows.
const ENRICH_ORDERS = {
  me: ["McDonald's", 'Starbucks', 'Nike', 'Zara', 'Amazon', 'IKEA',
    'Netflix', 'Disney+', 'Prime Video', 'PlayStation',
    'Subway', 'Uber', 'Emirates', 'Airbnb', 'Whole Foods Market', 'Spotify', 'H&M',
    'Louis Vuitton', 'Google Play Store',
    'Apple', 'Adidas', 'Mercedes-Benz', 'British Airways', 'Carrefour'],
  eu: ["McDonald's", 'Starbucks', 'Zara', 'H&M', 'Amazon', 'IKEA', 'Netflix', 'Spotify',
    'Zalando', 'Uber', 'Lufthansa', 'Ryanair', 'Airbnb', 'Deliveroo', 'Lidl', 'PayPal',
    'Vodafone', 'Deutsche Bahn', 'Decathlon', 'Primark', 'PlayStation', 'Carrefour'],
  jp: ['スターバックス Starbucks', "マクドナルド McDonald's", 'ユニクロ Uniqlo', '無印良品 MUJI', 'Amazon',
    '楽天市場 Rakuten', 'セブン-イレブン 7-Eleven', 'ローソン Lawson', '任天堂 Nintendo', 'PlayStation',
    'Netflix', 'JR東日本 JR East', 'ANA 全日空', 'PayPay', '吉野家 Yoshinoya', 'くら寿司 Kura Sushi',
    'ヨドバシカメラ Yodobashi', 'ニトリ Nitori', 'Uber Eats', 'Spotify'],
  my: ['GrabFood', 'Shopee', 'Lazada', "McDonald's", 'Starbucks', 'AirAsia', 'Petronas',
    'Maybank', 'Uniqlo', 'Netflix', 'Spotify', "Touch 'n Go", 'ZUS Coffee', 'Tealive',
    'Jaya Grocer', 'Mr DIY', 'Boost', 'GSC Cinemas', 'Grab', 'AEON'],
  sg: ['Grab', 'Shopee', 'foodpanda', 'Starbucks', "McDonald's", 'Singapore Airlines', 'DBS',
    'FairPrice', 'Uniqlo', 'Netflix', 'Spotify', 'Charles & Keith', 'Ya Kun Kaya Toast',
    'Marina Bay Sands', 'Gojek', 'EZ-Link', 'Lazada', 'IKEA', 'Golden Village', 'Singtel'],
  za: ['Checkers', 'Pick n Pay', 'Woolworths', "Nando's", 'Uber', 'Takealot', 'Netflix',
    'Vodacom', 'MTN', 'Capitec', 'FNB', 'Mr Price', 'Clicks', 'Dis-Chem', 'Steers',
    'Uber Eats', 'Showmax', 'DStv', 'FlySafair', 'Spotify'],
};

// Small 4-point sparkle to hint "tap to enrich".
function Sparkle({ size = 12, color = 'currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{ display: 'block' }}>
      <path d="M12 2c.5 4.6 2.4 6.5 7 7-4.6.5-6.5 2.4-7 7-.5-4.6-2.4-6.5-7-7 4.6-.5 6.5-2.4 7-7Z" fill={color} />
    </svg>
  );
}

// The raw bank feed — enriched live. Tap a row (or "Enrich all") and Lune turns
// the cryptic descriptor into a clean merchant, logo and category in real time.
function RawTransactions({ T, period, enriched, onToggle, ctaLabel = 'Open in app', standalone = false }) {
  const scoped = D().forPeriod(period);
  // One transaction per brand, ordered to lead with the most globally-recognised
  // brands (fast food + coffee, apparel, e-commerce, subscriptions), with
  // groceries lower down (they brand differently across borders).
  const txns = React.useMemo(() => {
    // Use the uncapped current-month feed so every curated brand is present
    // (forPeriod caps at 120 + day-sorts, which drops low-frequency brands).
    const regionKey = (window.CURRENT_REGION || {}).key || 'me';
    const ORDER = ENRICH_ORDERS[regionKey] || [];
    const byMerchant = new Map();
    for (const t of D().TRANSACTIONS) { if (!byMerchant.has(t.merchant)) byMerchant.set(t.merchant, t); }
    const ordered = ORDER.map((n) => byMerchant.get(n)).filter(Boolean);
    const rest = [...byMerchant.values()].filter((t) => !ordered.includes(t));
    return [...ordered, ...rest].slice(0, 24);
  }, [period]);
  const mono = "'SF Mono', ui-monospace, 'Roboto Mono', Menlo, monospace";
  const [done, setDone] = React.useState({});
  const [delays, setDelays] = React.useState({});
  const nDone = txns.filter(t => done[t.id]).length;
  const allDone = nDone === txns.length;

  const enrichOne = (t) => {
    if (done[t.id]) return;
    setDone(d => ({ ...d, [t.id]: true }));
    setDelays(x => ({ ...x, [t.id]: 0 }));
  };
  const enrichAll = () => {
    const nd = { ...done }, nx = { ...delays }; let k = 0;
    txns.forEach(t => { if (!nd[t.id]) { nd[t.id] = true; nx[t.id] = k * 55; k++; } });
    setDone(nd); setDelays(nx);
  };

  return (
    <Screen T={T}>
      {/* Warm the browser cache on mount so every logo reveals instantly on enrich */}
      <div aria-hidden style={{ position: 'absolute', width: 0, height: 0, overflow: 'hidden', opacity: 0, pointerEvents: 'none' }}>
        {txns.map((t) => { const s = logoSources(t.merchant)[0]; return s ? <img key={t.merchant} src={s} alt="" width="2" height="2" /> : null; })}
      </div>
      {/* top nav — enter the in-app PFM portal */}
      <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 16 }}>
        <button className="pressable" onClick={() => onToggle(true)} style={{
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 7,
          padding: standalone ? '13px 18px' : '9px 15px', borderRadius: standalone ? 14 : 999, border: 'none',
          width: standalone ? '100%' : 'auto',
          fontFamily: 'inherit', fontSize: standalone ? 14.5 : 13, fontWeight: 680, color: '#fff', background: T.accent,
          boxShadow: `0 6px 16px ${hexA(T.accent, 0.30)}`, cursor: 'pointer',
        }}><LuneMark size={15} disc="#fff" crescent={T.accent} />{ctaLabel} →</button>
      </div>
      <div style={{ fontSize: 25, fontWeight: 700, letterSpacing: '-0.025em', color: T.ink }}>Your transactions</div>
      <div style={{ fontSize: 13, color: T.muted, marginTop: 6, lineHeight: 1.55 }}>Below is the raw feed of transactions the bank receives — cryptic descriptions, no clear merchant name, logo or category.</div>
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 7, marginTop: 11, padding: '8px 13px', borderRadius: 10, background: hexA(T.accent, T.dark ? 0.16 : 0.10), color: T.ink, fontSize: 14, fontWeight: 720, letterSpacing: '-0.01em' }}>
        <Sparkle size={14} color={T.accent} />Tap any row to enrich
      </div>

      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, marginTop: 16 }}>
        <div style={{ fontSize: 12.5, color: T.muted, fontWeight: 560, fontVariantNumeric: 'tabular-nums' }}>{nDone} of {txns.length} enriched</div>
        <button className="pressable" onClick={enrichAll} disabled={allDone} style={{
          display: 'inline-flex', alignItems: 'center', gap: 7, padding: '9px 15px', borderRadius: 11, border: 'none',
          fontFamily: 'inherit', fontSize: 13.5, fontWeight: 680, cursor: allDone ? 'default' : 'pointer',
          color: allDone ? T.muted : '#fff', background: allDone ? (T.dark ? 'rgba(255,255,255,0.08)' : 'rgba(7,3,18,0.05)') : T.accent,
          boxShadow: allDone ? 'none' : `0 6px 16px ${hexA(T.accent, 0.34)}`, transition: 'all .18s',
        }}>
          {allDone
            ? <React.Fragment>✓ All enriched</React.Fragment>
            : <React.Fragment><LuneMark size={15} disc="#fff" crescent={T.accent} />Enrich all</React.Fragment>}
        </button>
      </div>

      <div style={{ marginTop: 12 }}>
        <Card T={T} pad="2px 16px">
          {txns.map((t, i, a) => {
            const isDone = !!done[t.id];
            const cat = D().CATEGORIES[t.categoryId];
            const delay = (delays[t.id] || 0) + 'ms';
            return (
              <div key={t.id}
                className={(isDone ? 'enrich-flash ' : 'pressable-row ')}
                onClick={isDone ? undefined : () => enrichOne(t)}
                style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '12px 0', position: 'relative',
                  cursor: isDone ? 'default' : 'pointer', borderRadius: 10,
                  animationDelay: delay, '--enrich-flash': hexA(T.accent, T.dark ? 0.22 : 0.13),
                }}>
                {isDone ? (
                  <React.Fragment>
                    <span className="enrich-content" style={{ animationDelay: delay, flexShrink: 0, display: 'inline-flex' }}>
                      <MerchantMark name={t.merchant} glyph={t.glyph} catColor={t.categoryColor} showLogos={true} dark={T.dark} size={40} radius={12} />
                    </span>
                    <div className="enrich-content" style={{ animationDelay: delay, flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 15, fontWeight: 560, color: T.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{t.merchant}</div>
                      <div style={{ marginTop: 4 }}>
                        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, padding: '2px 8px', borderRadius: 20, background: hexA(t.categoryColor, T.dark ? 0.20 : 0.12), color: t.categoryColor, fontSize: 11, fontWeight: 640 }}>
                          <CatGlyph glyph={t.glyph} size={11} color={t.categoryColor} />{t.category}
                        </span>
                      </div>
                    </div>
                    <div className="enrich-content" style={{ animationDelay: delay, textAlign: 'right', flexShrink: 0 }}>
                      <div style={{ fontSize: 15, fontWeight: 600, color: T.ink, fontVariantNumeric: 'tabular-nums' }}>
                        <span style={{ display: 'inline-flex', color: T.muted, marginRight: 3 }}><Dirham size={11} color="currentColor" /></span>{fmtAED(t.amount, true)}
                      </div>
                      <div style={{ fontSize: 11.5, color: T.muted, marginTop: 2 }}>{t.day + ' ' + (t.month || 'May')}</div>
                    </div>
                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <span style={{ width: 40, height: 40, borderRadius: 12, flexShrink: 0, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', background: T.dark ? 'rgba(255,255,255,0.05)' : 'rgba(7,3,18,0.035)', border: `1px dashed ${hexA(T.accent, 0.5)}`, color: hexA(T.accent, 0.85) }}>
                      <Sparkle size={13} color="currentColor" />
                    </span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontFamily: mono, fontSize: 12.5, color: T.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{rawDescriptor(t)}</div>
                      <div style={{ fontFamily: mono, fontSize: 11, color: T.muted, marginTop: 3 }}>{t.date}</div>
                    </div>
                    <div style={{ fontFamily: mono, fontSize: 13.5, fontWeight: 600, color: T.ink, fontVariantNumeric: 'tabular-nums', flexShrink: 0, display: 'inline-flex', alignItems: 'baseline', gap: 3 }}><Dirham size={11} color="currentColor" />{fmtAED(t.amount, true)}</div>
                  </React.Fragment>
                )}
                {i < a.length - 1 && <div style={{ position: 'absolute', left: 52, right: 0, bottom: 0, height: 1, background: T.faint }} />}
              </div>
            );
          })}
        </Card>
      </div>

      {allDone ? (
        <div style={{ marginTop: 16, padding: '15px 16px', borderRadius: 16, background: hexA(T.accent, T.dark ? 0.14 : 0.08), border: `1px solid ${hexA(T.accent, 0.28)}` }}>
          <div style={{ fontSize: 13.5, fontWeight: 680, color: T.ink }}>Every transaction, enriched.</div>
          <div style={{ fontSize: 12.5, color: T.muted, lineHeight: 1.5, marginTop: 4 }}>Clean merchants, logos and categories — from the same raw feed. Now see how it powers the experience inside your app.</div>
          <button className="pressable" onClick={() => onToggle(true)} style={{
            marginTop: 12, width: '100%', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            padding: '12px 16px', borderRadius: 12, border: 'none', fontFamily: 'inherit', fontSize: 14, fontWeight: 680,
            color: '#fff', background: T.accent, boxShadow: `0 8px 20px ${hexA(T.accent, 0.34)}`, cursor: 'pointer',
          }}><LuneMark size={16} disc="#fff" crescent={T.accent} />See it in your app →</button>
        </div>
      ) : (
        <div style={{ display: 'flex', gap: 10, alignItems: 'flex-start', marginTop: 16, padding: '13px 15px', borderRadius: 14, background: T.dark ? 'rgba(255,255,255,0.04)' : 'rgba(7,3,18,0.03)', border: `1px solid ${T.line}` }}>
          <span style={{ marginTop: 1, flexShrink: 0, color: T.accent }}><Sparkle size={16} color="currentColor" /></span>
          <div style={{ fontSize: 12.5, color: T.muted, lineHeight: 1.5 }}>
            This is your data <b style={{ color: T.ink }}>before Lune</b>. Tap a transaction to enrich it — or <b style={{ color: T.ink }}>Enrich all</b> — then tap <b style={{ color: T.ink }}>Open in app</b>.
          </div>
        </div>
      )}
    </Screen>
  );
}

function Spends({ T, showLogos, period, actions, enriched, onToggle, cardType = 'all', onCardType }) {
  const CARD_LABEL = { all: 'All cards', debit: 'Debit card', credit: 'Credit card', savings: 'Savings account' };
  const scoped = D().forPeriod(period);
  const { CATEGORY_SPEND, TOTAL, TRANSACTIONS, PREV } = scoped;
  const prevTotal = scoped.hasPrev ? scoped.prevTotal : null;
  // Top brands across ALL categories for the selected timeframe — the donut
  // above carries category share; this list carries where the money went.
  const topBrands = CATEGORY_SPEND
    .flatMap((c) => (c.brands || []).map((b) => ({ ...b, catId: c.id, catName: c.name, color: c.color, glyph: c.glyph })))
    .sort((a, b) => b.total - a.total).slice(0, 6);
  return (
    <Screen T={T}>
      {/* top nav — back to the raw transactions feed */}
      <div style={{ marginBottom: 14 }}>
        <button className="pressable" onClick={() => onToggle(false)} style={{
          display: 'inline-flex', alignItems: 'center', gap: 6, padding: '8px 14px 8px 11px', borderRadius: 999, cursor: 'pointer',
          border: `1px solid ${T.line}`, background: T.surface, fontFamily: 'inherit', fontSize: 13, fontWeight: 620, color: T.ink,
        }}><UIIcon name="chevL" size={15} stroke="currentColor" />Transactions</button>
      </div>
      <AppHeader T={T} title="Spends" period={period} onPeriod={actions.openPeriod}
        extra={onCardType && (
          <button className="pressable" onClick={onCardType} style={{
            display: 'inline-flex', alignItems: 'center', gap: 7, cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0,
            background: cardType === 'all' ? T.surface : hexA(T.accent, T.dark ? 0.18 : 0.10),
            border: `1px solid ${cardType === 'all' ? T.line : hexA(T.accent, 0.4)}`, borderRadius: 999,
            padding: '8px 13px', color: T.ink, fontFamily: 'inherit',
            fontSize: 13.5, fontWeight: 580, boxShadow: T.dark ? 'none' : T.cardShadow,
          }}>
            <span style={{ color: T.accent, display: 'flex' }}><WalletIcon size={15} stroke={T.accent} /></span>
            {CARD_LABEL[cardType]}
            <UIIcon name="chevD" size={15} stroke={T.muted} />
          </button>
        )} />

      {/* Hero: the clean ring + the ranked category list, one focal block. */}
      <div style={{ marginTop: 16 }}>
        <Card T={T} pad={20}>
          <SpendRing data={CATEGORY_SPEND} total={TOTAL} prevTotal={prevTotal}
            dark={T.dark} ink={T.ink} muted={T.muted} surface={T.surface}
            onSlice={(id) => (id === '__other' ? actions.openBreakdown() : actions.openCategory(id))} />

          <div style={{ height: 1, background: T.faint, margin: '18px -20px 8px' }} />

          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', margin: '6px 0 8px' }}>
            <span style={{ fontSize: 13, fontWeight: 640, color: T.ink, letterSpacing: '-0.01em' }}>Top brands</span>
            <button className="pressable" onClick={actions.openBreakdown} style={{ border: 'none', background: 'none', padding: 0, cursor: 'pointer', fontFamily: 'inherit', fontSize: 13, fontWeight: 600, color: T.accent }}>All categories</button>
          </div>
          <RankedBars
            data={topBrands.map((b) => ({ id: b.name, name: b.name, total: b.total, color: b.color, logoName: b.name, glyph: b.glyph }))}
            total={TOTAL} max={topBrands[0] ? topBrands[0].total : 1}
            dark={T.dark} ink={T.ink} muted={T.muted}
            onBar={(d) => { const b = topBrands.find((x) => x.name === d.name); if (!b) return;
              actions.openTxnList({ title: b.name, subtitle: `${b.catName} · ${b.count} transaction${b.count === 1 ? '' : 's'}`, total: b.total, txns: D().txnsForBrand(b.catId, b.name, scoped.months) }); }} />
        </Card>
      </div>

      {/* Two entry points: category (+brand) breakdown, and the historical view */}
      <div style={{ marginTop: 22 }}>
        <Card T={T} pad="2px 18px">
          <TrendRow T={T} label="Category trends" caption="By category, then brand" onClick={actions.openCategoryTrends}
            icon={<WalletIcon size={19} stroke={T.accent} />} divider />
          <TrendRow T={T} label="Spending over time" caption="Month by month · last 12 months" onClick={actions.openSpendOverTime}
            icon={<UIIcon name="trend" size={19} stroke={T.accent} />} />
        </Card>
      </div>

      {/* listView() — recent transactions; longer periods surface more rows */}
      <SectionTitle T={T} action={`View all (${scoped.TXN_COUNT})`} onAction={actions.openAllTxns}>Recent</SectionTitle>
      <Card T={T} pad="2px 18px">
        {TRANSACTIONS.slice(0, scoped.months === 1 ? 6 : scoped.months === 3 ? 12 : 16).map((t, i, a) => (
          <TxnRow key={t.id} T={T} txn={t} showLogos={showLogos} onClick={() => actions.openTxn(t)} divider={i < a.length - 1} />
        ))}
      </Card>
      <div style={{ fontSize: 11.5, color: T.muted, lineHeight: 1.5, margin: '14px 4px 0' }}>
        Amounts reflect settled transactions and may differ from your statement.
      </div>
    </Screen>
  );
}

// ── ExpenseBreakdown (Spend Categories) — presented as a sheet ───────
function BreakdownSheet({ T, open, onClose, showLogos, period, actions, z }) {
  const { CATEGORY_SPEND, TOTAL } = D().forPeriod(period);
  const [sort, setSort] = React.useState('spend');
  const [dir, setDir] = React.useState('desc');
  const setSortKey = (k) => { if (k === sort) setDir((d) => (d === 'asc' ? 'desc' : 'asc')); else { setSort(k); setDir(k === 'name' ? 'asc' : 'desc'); } };
  // SwiftUI sorts by name or by amount magnitude (default: amount, desc).
  const sorted = [...CATEGORY_SPEND].sort((a, b) => {
    const r = sort === 'name' ? a.name.localeCompare(b.name) : a.total - b.total;
    return dir === 'asc' ? r : -r;
  });
  return (
    <Sheet T={T} open={open} onClose={onClose} title="Spend Categories" z={z}>
      {/* buildTotalSpendAmount + pre-trailing trend icon */}
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12, marginTop: -2, marginBottom: 6 }}>
        <div>
          <div style={{ fontSize: 13, color: T.muted, fontWeight: 540 }}>Total spend</div>
          <div style={{ fontSize: 30, fontWeight: 720, color: T.ink, letterSpacing: '-0.03em', marginTop: 2, fontVariantNumeric: 'tabular-nums' }}>
            <span style={{ display: 'inline-flex', color: T.muted, marginRight: 5 }}><Dirham size={17} color="currentColor" /></span>{fmtAED(TOTAL)}
          </div>
        </div>
        <button onClick={actions.openCategoryTrends} aria-label="Category trends" style={{
          width: 38, height: 38, borderRadius: 12, flexShrink: 0, cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          background: T.surface, border: `1px solid ${T.line}`, color: T.accent, boxShadow: T.dark ? 'none' : T.cardShadow,
        }}><UIIcon name="trend" size={20} stroke={T.accent} /></button>
      </div>
      <div style={{ margin: '12px 0 4px' }}><PeriodPill T={T} period={period} onClick={actions.openPeriod} inline /></div>
      <div style={{ margin: '16px 0 4px' }}><SortBar T={T} value={sort} dir={dir} onChange={setSortKey} /></div>
      <Card T={T} pad="2px 18px" style={{ marginTop: 12 }}>
        {sorted.map((c, i, a) => (
          <CategoryRow key={c.id} T={T} cat={c} total={TOTAL} onClick={() => actions.openCategory(c.id)} divider={i < a.length - 1} />
        ))}
      </Card>
    </Sheet>
  );
}

// Small segmented control (e.g. sort Amount / Txns).
function SortSwitch({ T, value, onChange, options }) {
  return (
    <div style={{ display: 'inline-flex', gap: 3, padding: 3, borderRadius: 10, background: T.dark ? 'rgba(255,255,255,0.06)' : 'rgba(7,3,18,0.05)', flexShrink: 0 }}>
      {options.map(([val, label]) => {
        const active = value === val;
        return (
          <button key={val} className="pressable" onClick={() => onChange(val)} style={{
            padding: '6px 12px', borderRadius: 8, border: 'none', cursor: 'pointer', fontFamily: 'inherit',
            fontSize: 12.5, fontWeight: 620, color: active ? T.ink : T.muted,
            background: active ? T.surface : 'transparent',
            boxShadow: active ? (T.dark ? `inset 0 0 0 1px ${T.line}` : '0 1px 2px rgba(7,3,18,0.14)') : 'none',
            transition: 'color .15s',
          }}>{label}</button>
        );
      })}
    </div>
  );
}

// ── Trends — one sheet, two views (Categories / Brands) via a toggle, so you
//    can switch between them without closing. Category = spend over time +
//    ranked + movers; Brand = every brand across categories, ranked.
// Dropdown trigger — opens the category picker sheet.
function CategoryDropdown({ T, label, glyph, color, onOpen }) {
  return (
    <button className="pressable" onClick={onOpen} style={{
      display: 'inline-flex', alignItems: 'center', gap: 9, cursor: 'pointer', fontFamily: 'inherit',
      background: T.surface, border: `1px solid ${T.line}`, borderRadius: 12, padding: '8px 12px',
      color: T.ink, fontSize: 14, fontWeight: 600, boxShadow: T.dark ? 'none' : T.cardShadow, maxWidth: '100%',
    }}>
      {glyph ? <CategoryMark glyph={glyph} color={color} dark={T.dark} size={22} /> : <span style={{ color: T.accent, display: 'flex' }}><UIIcon name="filter" size={16} stroke={T.accent} /></span>}
      <span style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{label}</span>
      <UIIcon name="chevD" size={16} stroke={T.muted} />
    </button>
  );
}

// Category picker (used by the Trends dropdowns).
function CategoryPickerSheet({ T, open, onClose, categories, value, onPick, z }) {
  const row = (key, node, selected, onClick) => (
    <button key={key} className="pressable-row" onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 13, width: '100%', padding: '11px 0', border: 'none', background: 'transparent', cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left', position: 'relative' }}>
      {node}
      {selected && <span style={{ color: T.accent, display: 'flex' }}><UIIcon name="trend" size={0} /></span>}
      {selected && <span style={{ fontSize: 13, fontWeight: 700, color: T.accent }}>✓</span>}
    </button>
  );
  return (
    <Sheet T={T} open={open} onClose={onClose} title="Choose category" z={z}>
      <Card T={T} pad="2px 18px">
        {row('all',
          <React.Fragment>
            <span style={{ width: 36, height: 36, borderRadius: 999, background: hexA(T.accent, T.dark ? 0.2 : 0.11), color: T.accent, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><UIIcon name="filter" size={17} stroke={T.accent} /></span>
            <span style={{ flex: 1, fontSize: 15, fontWeight: 560, color: T.ink }}>All categories</span>
          </React.Fragment>,
          value == null, () => { onPick(null); onClose(); })}
        {categories.map((c) => row(c.id,
          <React.Fragment>
            <CategoryMark glyph={c.glyph} color={c.color} dark={T.dark} size={36} />
            <span style={{ flex: 1, fontSize: 15, fontWeight: 560, color: T.ink }}>{c.name}</span>
            <span style={{ fontSize: 13.5, fontWeight: 600, color: T.muted, fontVariantNumeric: 'tabular-nums' }}><Dirham size={12} color="currentColor" style={{ marginRight: 3 }} />{fmtAED(c.total)}</span>
          </React.Fragment>,
          value === c.id, () => { onPick(c.id); onClose(); }))}
      </Card>
    </Sheet>
  );
}

// ── Trends — a full PAGE. Two modes:
//   'category'  : date-filtered. Categories ranked → drill a category → the
//                 BRANDS inside it (brand trends live here). No time chart.
//   'overtime'  : historical (no date picker — it clashes). Monthly bar chart
//                 for all categories (or a picked one) → ranked by spend.
function TrendsPage({ T, showLogos, period, actions, mode, initialCatId, onClose }) {
  // Internal history so Back pops one level at a time (deselect a category)
  // rather than always closing to the landing screen.
  const [stack, setStack] = React.useState([initialCatId != null ? initialCatId : null]);
  const [pickerOpen, setPickerOpen] = React.useState(false);
  const [brandSort, setBrandSort] = React.useState('amount'); // 'amount' | 'count'
  const catId = stack[stack.length - 1];
  const goCat = (id) => setStack((s) => (s[s.length - 1] === id ? s : [...s, id]));
  const goBack = () => { if (stack.length > 1) setStack((s) => s.slice(0, -1)); else onClose(); };

  const { CATEGORY_SPEND, TOTAL, PREV } = D().forPeriod(period);
  const { monthlyTotals, categoryMonths } = D();
  const ranked = [...CATEGORY_SPEND].sort((a, b) => b.total - a.total);
  const cat = catId != null ? CATEGORY_SPEND.find((c) => c.id === catId) : null;
  const openBrand = (b) => {
    const c = cat || CATEGORY_SPEND.find((x) => x.id === b.catId);
    const bt = c && (c.brands || []).find((x) => x.name === b.name);
    actions.openTxnList({ title: b.name, subtitle: `in ${(c && c.name) || b.catName || ''}`, total: bt ? bt.total : undefined, txns: D().txnsForBrand((c && c.id) || b.catId, b.name, D().monthsForPeriod(period)) });
  };

  const title = mode === 'overtime' ? 'Spending over time' : (cat ? 'Brand trends' : 'Category trends');
  const catHeader = (c) => (
    <div style={{ display: 'flex', alignItems: 'center', gap: 13, marginBottom: 16 }}>
      <CategoryMark glyph={c.glyph} color={c.color} dark={T.dark} size={46} solid />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 22, fontWeight: 720, color: T.ink, letterSpacing: '-0.025em', fontVariantNumeric: 'tabular-nums' }}>
          <span style={{ display: 'inline-flex', color: T.muted, marginRight: 3 }}><Dirham size={13} color="currentColor" /></span>{fmtAED(c.total)}
        </div>
        <div style={{ fontSize: 12.5, color: T.muted, marginTop: 2 }}>{c.count} transactions · {(c.brands || []).length} brands</div>
      </div>
    </div>
  );

  return (
    <div className="page-in" style={{ position: 'absolute', inset: 0, zIndex: 242, background: T.bg, display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '58px 18px 0', flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, minHeight: 40 }}>
          <button className="pressable" onClick={goBack} aria-label="Back" style={{ width: 38, height: 38, borderRadius: 12, flexShrink: 0, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', background: T.surface, border: `1px solid ${T.line}`, color: T.ink, boxShadow: T.dark ? 'none' : T.cardShadow }}>
            <UIIcon name="chevL" size={20} />
          </button>
          <div style={{ flex: 1, fontSize: 25, fontWeight: 700, letterSpacing: '-0.025em', color: T.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{title}</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginTop: 14 }}>
          {mode === 'overtime'
            ? <span style={{ fontSize: 12.5, fontWeight: 600, color: T.muted, background: T.surface, border: `1px solid ${T.line}`, borderRadius: 999, padding: '8px 13px', whiteSpace: 'nowrap', flexShrink: 0 }}>Last 12 months</span>
            : <PeriodPill T={T} period={period} onClick={actions.openPeriod} inline />}
          <CategoryDropdown T={T} label={cat ? cat.name : 'All categories'} glyph={cat && cat.glyph} color={cat && cat.color} onOpen={() => setPickerOpen(true)} />
        </div>
      </div>

      <div className="exp-screens" style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', padding: '2px 18px 40px' }}>
        {mode === 'overtime' ? (
          cat ? (
            <React.Fragment>
              <SectionTitle T={T}>{cat.name} · per month</SectionTitle>
              <Card T={T} pad={20}>
                {catHeader(cat)}
                <ColumnTrend values={categoryMonths(cat.id).vals} labels={categoryMonths(cat.id).labels} color={cat.color} dark={T.dark} ink={T.ink} muted={T.muted} height={150} onMonth={(i) => actions.openCatMonth(cat.id, i)} solid />
                <div style={{ fontSize: 11.5, color: T.muted, textAlign: 'center', marginTop: 12 }}>Tap a month for its transactions</div>
              </Card>
              <SectionTitle T={T} action="View all" onAction={() => actions.openCategoryTxns(cat.id)}>Top brands</SectionTitle>
              <Card T={T} pad={20}>
                <RankedBars data={[...(cat.brands || [])].sort((a, b) => b.total - a.total).map((b) => ({ id: b.name, name: b.name, total: b.total, color: cat.color, logoName: b.name, glyph: cat.glyph }))} total={cat.total} max={(cat.brands || [])[0] ? [...cat.brands].sort((a, b) => b.total - a.total)[0].total : 1} dark={T.dark} ink={T.ink} muted={T.muted} onBar={(d) => openBrand({ name: d.name, catId: cat.id, catName: cat.name })} />
              </Card>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <SectionTitle T={T}>Total spend per month</SectionTitle>
              <Card T={T} pad={20}>
                <ColumnTrend values={monthlyTotals().vals} labels={monthlyTotals().labels} color={T.accent} dark={T.dark} ink={T.ink} muted={T.muted} height={150} solid />
                <div style={{ fontSize: 11.5, color: T.muted, textAlign: 'center', marginTop: 12 }}>All categories · last 12 months</div>
              </Card>
              <SectionTitle T={T}>Ranked by spend</SectionTitle>
              <Card T={T} pad={20}>
                <div style={{ fontSize: 13, color: T.muted, fontWeight: 540, marginBottom: 16 }}>Tap a category for its monthly trend</div>
                <RankedBars data={ranked} total={TOTAL} max={ranked[0] ? ranked[0].total : 1} dark={T.dark} ink={T.ink} muted={T.muted} onBar={(d) => goCat(d.id)} />
              </Card>
            </React.Fragment>
          )
        ) : (
          cat ? (() => {
            const brands = [...(cat.brands || [])].sort((a, b) => brandSort === 'count' ? b.count - a.count : b.total - a.total);
            const barData = brands.map((b) => (brandSort === 'count'
              ? { id: b.name, name: b.name, total: b.count, color: cat.color, label: `${b.count} txns`, logoName: b.name, glyph: cat.glyph }
              : { id: b.name, name: b.name, total: b.total, color: cat.color, logoName: b.name, glyph: cat.glyph }));
            const barMax = barData[0] ? barData[0].total : 1;
            return (
            <React.Fragment>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, margin: '20px 2px 12px' }}>
                <h2 style={{ margin: 0, fontSize: 17, fontWeight: 640, letterSpacing: '-0.01em', color: T.ink }}>Brands in {cat.name}</h2>
                <SortSwitch T={T} value={brandSort} onChange={setBrandSort} options={[['amount', 'Amount'], ['count', 'Txns']]} />
              </div>
              <Card T={T} pad={20}>
                {catHeader(cat)}
                <div style={{ fontSize: 13, color: T.muted, fontWeight: 540, marginBottom: 16 }}>Where this category's spend goes · tap a brand for its transactions</div>
                <RankedBars data={barData} total={brandSort === 'count' ? null : cat.total} max={barMax} dark={T.dark} ink={T.ink} muted={T.muted} onBar={(d) => openBrand({ name: d.name, catId: cat.id, catName: cat.name })} />
              </Card>
              <SectionTitle T={T} action="View all" onAction={() => actions.openCategoryTxns(cat.id)}>All brands</SectionTitle>
              <Card T={T} pad="2px 18px">
                {brands.map((b, i, a) => (
                  <div key={b.name} className="pressable-row" onClick={() => openBrand({ ...b, catId: cat.id, catName: cat.name })} style={{ display: 'flex', alignItems: 'center', gap: 13, padding: '12px 0', cursor: 'pointer', position: 'relative' }}>
                    <MerchantMark name={b.name} glyph={cat.glyph} catColor={cat.color} showLogos={showLogos} dark={T.dark} size={40} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 15, fontWeight: 560, color: T.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{b.name}</div>
                      <div style={{ fontSize: 12.5, color: T.muted, marginTop: 2 }}>{b.count} transactions</div>
                    </div>
                    <div style={{ fontSize: 15, fontWeight: 600, color: T.ink, fontVariantNumeric: 'tabular-nums' }}><Dirham size={12} color="currentColor" style={{ marginRight: 3 }} />{fmtAED(b.total)}</div>
                    {i < a.length - 1 && <div style={{ position: 'absolute', left: 53, right: 0, bottom: 0, height: 1, background: T.faint }} />}
                  </div>
                ))}
              </Card>
            </React.Fragment>
            );
          })() : (
            <React.Fragment>
              <SectionTitle T={T}>Ranked by spend</SectionTitle>
              <Card T={T} pad={20}>
                <div style={{ fontSize: 13, color: T.muted, fontWeight: 540, marginBottom: 16 }}>Tap a category to see the brands inside it</div>
                <RankedBars data={ranked} total={TOTAL} max={ranked[0] ? ranked[0].total : 1} dark={T.dark} ink={T.ink} muted={T.muted} onBar={(d) => goCat(d.id)} />
              </Card>
              <SectionTitle T={T}>Movers vs previous period</SectionTitle>
              <Card T={T} pad="2px 18px">
                {ranked.map((c, i, a) => {
                  const prev = PREV[c.id] || c.total;
                  const delta = Math.round(((c.total - prev) / prev) * 100);
                  const up = delta >= 0;
                  return (
                    <div key={c.id} className="pressable-row" onClick={() => goCat(c.id)} style={{ display: 'flex', alignItems: 'center', gap: 13, padding: '13px 0', cursor: 'pointer', position: 'relative' }}>
                      <CategoryMark glyph={c.glyph} color={c.color} dark={T.dark} size={40} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 15, fontWeight: 560, color: T.ink }}>{c.name}</div>
                        <div style={{ fontSize: 12.5, color: T.muted, marginTop: 2 }}><Dirham size={12} color="currentColor" style={{ marginRight: 3 }} />{fmtAED(c.total)}</div>
                      </div>
                      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 13, fontWeight: 620, color: up ? T.posInk : T.negInk }}>
                        <UIIcon name={up ? 'arrowUp' : 'arrowDn'} size={14} stroke="currentColor" />{Math.abs(delta)}%
                      </div>
                      {i < a.length - 1 && <div style={{ position: 'absolute', left: 53, right: 0, bottom: 0, height: 1, background: T.faint }} />}
                    </div>
                  );
                })}
              </Card>
            </React.Fragment>
          )
        )}
      </div>

      <CategoryPickerSheet T={T} open={pickerOpen} onClose={() => setPickerOpen(false)} categories={ranked} value={catId} onPick={goCat} z={320} />
    </div>
  );
}

// ── All transactions — presented as a sheet (TransactionListView) ───
function AllTxnsSheet({ T, open, onClose, showLogos, period, onTxn, z }) {
  const { TRANSACTIONS, TOTAL, TXN_COUNT } = D().forPeriod(period);
  const [q, setQ] = React.useState('');
  React.useEffect(() => { if (open) setQ(''); }, [open]);
  const searching = q.trim().length > 0;
  const filtered = searching ? TRANSACTIONS.filter((t) => t.merchant.toLowerCase().includes(q.toLowerCase()) || t.category.toLowerCase().includes(q.toLowerCase())) : TRANSACTIONS;
  const count = searching ? filtered.length : TXN_COUNT;
  const sum = searching ? filtered.reduce((s, t) => s + t.amount, 0) : TOTAL;
  const capped = !searching && TRANSACTIONS.length < TXN_COUNT;
  return (
    <Sheet T={T} open={open} onClose={onClose} title="Transactions" z={z}>
      <div style={{ marginBottom: 12 }}><SearchField T={T} value={q} onChange={setQ} placeholder="Search merchant or category" /></div>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', margin: '0 2px 10px' }}>
        <span style={{ fontSize: 13, color: T.muted, fontWeight: 540 }}>{count} transactions</span>
        <span style={{ fontSize: 14, color: T.ink, fontWeight: 640, fontVariantNumeric: 'tabular-nums' }}><Dirham size={12} color="currentColor" style={{ marginRight: 3 }} />{fmtAED(sum)}</span>
      </div>
      <Card T={T} pad="2px 18px">
        {filtered.map((t, i, a) => (
          <TxnRow key={t.id} T={T} txn={t} showLogos={showLogos} onClick={() => onTxn(t)} divider={i < a.length - 1} />
        ))}
        {filtered.length === 0 && <div style={{ padding: '26px 0', textAlign: 'center', color: T.muted, fontSize: 14 }}>No transactions</div>}
      </Card>
      {capped && <div style={{ fontSize: 11.5, color: T.muted, textAlign: 'center', margin: '14px 4px 0' }}>Showing your most recent activity for this period.</div>}
    </Sheet>
  );
}

Object.assign(window, { Spends, RawTransactions, LuneToggle, BreakdownSheet, TrendsPage, CategoryPickerSheet, CategoryDropdown, AllTxnsSheet, TrendButton });

</script>

<script type="text/babel" data-presets="react">

  const btn = (label, href, primary) => (
