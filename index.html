  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;

  button, input { font-family: inherit; }
  .exp-screens::-webkit-scrollbar { width: 0; display: none; }

  :root { --ease-out: cubic-bezier(.23,1,.32,1); --ease-drawer: cubic-bezier(.32,.72,0,1); }
  /* Emil: every pressable confirms the tap. */
  .pressable { transition: transform .14s var(--ease-out); }
  .pressable:active { transform: scale(.97); }
  .pressable-row { transition: transform .14s var(--ease-out), background-color .14s ease; }
  .pressable-row:active { transform: scale(.988); }
  .slide-fwd { animation: slideFwd .36s cubic-bezier(.22,1,.36,1); }
  .slide-back { animation: slideBack .3s ease; }
  @keyframes slideFwd { from { transform: translateX(30px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }
  @keyframes slideBack { from { transform: translateX(-22px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }
  @keyframes growX { from { transform: scaleX(0) } to { transform: scaleX(1) } }
  @keyframes growY { from { transform: scaleY(0) } to { transform: scaleY(1) } }
  @keyframes donutIn { from { opacity: 0; transform: rotate(-90deg) scale(.92) } to { opacity: 1; transform: rotate(-90deg) scale(1) } }
  @keyframes popIn { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
  @keyframes pageIn { from { transform: translateX(100%) } to { transform: translateX(0) } }
  .page-in { animation: pageIn .34s cubic-bezier(.32,.72,0,1) both; }
  @keyframes ringDraw { from { stroke-dashoffset: 220 } to { stroke-dashoffset: 0 } }
  @keyframes enrichContent { from { opacity: 0; filter: blur(5px); transform: translateY(4px) } to { opacity: 1; filter: blur(0); transform: translateY(0) } }
  .enrich-content { animation: enrichContent .42s cubic-bezier(.32,.72,0,1) both; }
  @keyframes enrichFlash { 0% { background: var(--enrich-flash) } 100% { background: transparent } }
  .enrich-flash { animation: enrichFlash 1.1s ease-out both; }
  @keyframes rawFade { from { opacity: 1 } to { opacity: 0 } }
  @media (prefers-reduced-motion: reduce) {
    /* Keep opacity/color fades that aid comprehension; drop movement + scale. */
    *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .1s !important; }
    .pressable:active, .pressable-row:active { transform: none; }
  }

  };

  // Region registry: display meta + currency (symbol/rate/decimals) + catalog.
  // rate converts base units to local display units; dec 0 = whole yen.
  window.REGIONS = {
    me: { name: 'Middle East', flag: '🌍', code: 'AED', symbol: null, rate: 1,    dec: 2, catalog: CATALOG_ME },
    eu: { name: 'Europe',      flag: '🇪🇺', code: 'EUR', symbol: '€',  rate: 0.25, dec: 2, catalog: CATALOG_EU },
    jp: { name: 'Japan',       flag: '🇯🇵', code: 'JPY', symbol: '¥',  rate: 41,   dec: 0, catalog: CATALOG_JP },
    my: { name: 'Malaysia',    flag: '🇲🇾', code: 'MYR', symbol: 'RM', rate: 1.2,  dec: 2, catalog: CATALOG_MY },
    sg: { name: 'Singapore',   flag: '🇸🇬', code: 'SGD', symbol: 'S$', rate: 0.37, dec: 2, catalog: CATALOG_SG },
    za: { name: 'South Africa', flag: '🇿🇦', code: 'ZAR', symbol: 'R',  rate: 5,    dec: 2, catalog: CATALOG_ZA },
  };

  // Build (or rebuild) the entire dataset for one region — everything below
  // closes over that region's BRANDS, and window.EXP_DATA is replaced wholesale.
  function build(regionKey) {
    const REG = window.REGIONS[regionKey] || window.REGIONS.me;
    window.CURRENT_REGION = { key: regionKey, name: REG.name, code: REG.code, symbol: REG.symbol, rate: REG.rate, dec: REG.dec };
    const BRANDS = REG.catalog;

  const MERCHANT_CAT = {};
  Object.keys(BRANDS).forEach((cid) => { BRANDS[cid].forEach((b) => { MERCHANT_CAT[b.name] = Number(cid); }); });

  // Which card each brand settles on: loans/insurance/utilities/BNPL out of the
  // savings account, travel/shopping/entertainment/SaaS on credit, everyday
  // spend on debit — with a sprinkle of dining/groceries on credit for realism.
  const CARD_OF_CAT = { 16: 'savings', 17: 'savings', 9: 'savings', 1: 'savings', 15: 'credit', 11: 'credit', 4: 'credit', 18: 'credit', 6: 'debit', 10: 'debit', 14: 'debit', 7: 'debit', 3: 'debit', 5: 'debit', 19: 'debit' };
  const CARD_TYPE = {};
  Object.keys(BRANDS).forEach((cid) => { BRANDS[cid].forEach((b, i) => {
    let ct = CARD_OF_CAT[cid] || 'debit';
    if ((cid === '10' || cid === '6') && i % 3 === 2) ct = 'credit';
    CARD_TYPE[b.name] = ct;
  }); });
  const cardOK = (name) => { const f = window.EXP_CARD_FILTER || 'all'; return f === 'all' || CARD_TYPE[name] === f; };

  const rng = (seed) => { let s = (seed >>> 0) || 1; return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 4294967296; }; };
  const r2 = (n) => Math.round(n * 100) / 100;

  const MONTH_LABELS = ['Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
  const MONTH_YEAR  = ['2025', '2025', '2025', '2025', '2025', '2025', '2026', '2026', '2026', '2026', '2026', '2026'];
  const NUM_MONTHS = 12;

  // Spread each brand's typical-month figure across 12 months: recurring
  // staples (~80% of a category's spend) repeat every month at ±15%; the
  // occasional ~20% appear only in some months. So 3/6/12-month windows show a
  // genuinely different category + brand mix, not just a scaled 30-day snapshot.
  const BRAND_MONTHLY = {};
  Object.keys(BRANDS).forEach((cidStr) => {
    const cid = Number(cidStr);
    const list = [...BRANDS[cid]].sort((a, b) => b.total - a.total);
    const catTotal = list.reduce((s, b) => s + b.total, 0) || 1;
    let cum = 0; const recurring = new Set();
    list.forEach((b) => { if (cum < catTotal * 0.8) { recurring.add(b.name); cum += b.total; } });
    const r = rng(cid * 7919 + 13);
    BRAND_MONTHLY[cid] = list.map((b) => {
      const isRec = recurring.has(b.name) || list.length <= 1;
      const months = [];
      for (let m = 0; m < NUM_MONTHS; m++) {
        if (isRec) {
          months.push({ amount: r2(b.total * (0.85 + r() * 0.30)), count: Math.max(1, Math.round(b.count * (0.85 + r() * 0.30))) });
        } else if (r() < 0.55) {
          months.push({ amount: r2(b.total * (0.6 + r() * 0.9)), count: Math.max(1, Math.round(b.count * (0.6 + r() * 0.8))) });
        } else {
          months.push({ amount: 0, count: 0 });
        }
      }
      months[NUM_MONTHS - 1] = { amount: b.total, count: b.count }; // current month ≈ known 30-day figures
      return { name: b.name, recurring: isRec, months };
    });
  });

  // Sum brand-months [start,end) into category + brand aggregates.
  function aggregate(start, end) {
    const cats = CATEGORIES.map((c) => {
      const bms = (BRAND_MONTHLY[c.id] || []).filter((bm) => cardOK(bm.name));
      const brands = bms.map((bm) => {
        let total = 0, count = 0;
        for (let m = start; m < end; m++) { total += bm.months[m].amount; count += bm.months[m].count; }
        return { name: bm.name, total: r2(total), count };
      }).filter((b) => b.total > 0).sort((a, b) => b.total - a.total);
      return { ...c, total: r2(brands.reduce((s, b) => s + b.total, 0)), count: brands.reduce((s, b) => s + b.count, 0), brands };
    }).filter((c) => c.total > 0).sort((a, b) => b.total - a.total);
    return { cats, total: r2(cats.reduce((s, c) => s + c.total, 0)) };
  }

  const _CUR = aggregate(NUM_MONTHS - 1, NUM_MONTHS);
  const CATEGORY_SPEND = _CUR.cats;
  const TOTAL = _CUR.total;

  // Actual per-month series for the Spending-over-time charts.
  function categoryMonths(cid) {
    const bms = BRAND_MONTHLY[cid] || [];
    const vals = [];
    for (let m = 0; m < NUM_MONTHS; m++) { let t = 0; bms.forEach((bm) => { if (cardOK(bm.name)) t += bm.months[m].amount; }); vals.push(Math.round(t)); }
    return { labels: MONTH_LABELS, vals };
  }
  function monthlyTotals() {
    const vals = MONTH_LABELS.map(() => 0);
    Object.keys(BRAND_MONTHLY).forEach((cid) => { BRAND_MONTHLY[cid].forEach((bm) => { if (!cardOK(bm.name)) return; bm.months.forEach((mm, i) => { vals[i] += mm.amount; }); }); });
    return { labels: MONTH_LABELS, vals: vals.map((v) => Math.round(v)) };
  }

  function mk(merchant, amount, day, mLabel, mYear, id) {
    const cid = MERCHANT_CAT[merchant] || 19;
    const cat = CATEGORIES.find((c) => c.id === cid);
    return { id, merchant, categoryId: cid, category: cat.name, categoryColor: cat.color, glyph: cat.glyph, amount, date: `${day} ${mLabel} ${mYear}`, day, month: mLabel };
  }
  // Explode one (brand, month) bucket into individual transactions summing to `amount`.
  function bucketTxns(name, cid, m, amount, count) {
    const n = Math.min(Math.max(count, 1), 4);
    const r = rng(cid * 911 + m * 37 + name.length * 7 + 5);
    const out = []; let remaining = amount;
    const nameHash = name.split('').reduce((a, ch) => ((a * 31) + ch.charCodeAt(0)) >>> 0, 7) % 100000;
    for (let i = 0; i < n; i++) {
      const amt = i === n - 1 ? Math.max(2, r2(remaining)) : Math.max(3, r2((amount / n) * (0.6 + r() * 0.8)));
      remaining = r2(remaining - amt);
      const id = (((cid * 100 + m) * 100000) + nameHash) * 10 + i; // deterministic & stable across renders
      out.push(mk(name, amt, String(Math.floor(r() * 27) + 1).padStart(2, '0'), MONTH_LABELS[m], MONTH_YEAR[m], id));
    }
    return out;
  }
  // Transactions across months [start,end), newest first (per-month, day desc). Optional cap.
  function windowTxns(start, end, cap) {
    const out = [];
    for (let m = end - 1; m >= start; m--) {
      const monthTxns = [];
      CATEGORIES.forEach((c) => { (BRAND_MONTHLY[c.id] || []).forEach((bm) => { const mm = bm.months[m]; if (mm.amount > 0 && cardOK(bm.name)) monthTxns.push(...bucketTxns(bm.name, c.id, m, mm.amount, mm.count)); }); });
      monthTxns.sort((a, b) => Number(b.day) - Number(a.day));
      out.push(...monthTxns);
      if (cap && out.length >= cap) break;
    }
    return cap ? out.slice(0, cap) : out;
  }
  function txnsForCategory(cid, n) {
    const N = n || 1; const out = [];
    for (let m = NUM_MONTHS - 1; m >= NUM_MONTHS - N; m--) { (BRAND_MONTHLY[cid] || []).forEach((bm) => { const mm = bm.months[m]; if (mm.amount > 0 && cardOK(bm.name)) out.push(...bucketTxns(bm.name, cid, m, mm.amount, mm.count)); }); }
    return out.slice(0, 80);
  }
  function txnsForBrand(cid, brandName, n) {
    const N = n || 1; const bm = (BRAND_MONTHLY[cid] || []).find((x) => x.name === brandName); if (!bm) return [];
    const out = [];
    for (let m = NUM_MONTHS - 1; m >= NUM_MONTHS - N; m--) { const mm = bm.months[m]; if (mm.amount > 0) out.push(...bucketTxns(brandName, cid, m, mm.amount, mm.count)); }
    return out.slice(0, 60);
  }
  function txnsForCategoryMonth(cid, monthIdx) {
    const out = []; (BRAND_MONTHLY[cid] || []).forEach((bm) => { const mm = bm.months[monthIdx]; if (mm.amount > 0 && cardOK(bm.name)) out.push(...bucketTxns(bm.name, cid, monthIdx, mm.amount, mm.count)); });
    return out.sort((a, b) => Number(b.day) - Number(a.day));
  }
  function brandMonths(cid, brandName) {
    const bm = (BRAND_MONTHLY[cid] || []).find((x) => x.name === brandName);
    return { labels: MONTH_LABELS, vals: bm ? bm.months.map((m) => Math.round(m.amount)) : MONTH_LABELS.map(() => 0) };
  }

  const TRANSACTIONS = windowTxns(NUM_MONTHS - 1, NUM_MONTHS);
  const _PREVAGG = aggregate(NUM_MONTHS - 2, NUM_MONTHS - 1);
  const PREV = {}; _PREVAGG.cats.forEach((c) => { PREV[c.id] = c.total; });

  // ── Timeframe filter — sums the ACTUAL months inside the selected range,
  // so 3/6/12-month windows show a different category & brand mix (not a scaled
  // 30-day snapshot). "Spending over time" always shows the full 12-mo history.
  const ANCHOR = new Date(2026, 5, 28); // "today" = 28 Jun 2026
  const MO = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const DAY_MS = 86400000;
  function fmtDay(d, withYear) { return `${d.getDate()} ${MO[d.getMonth()]}${withYear ? ' ' + d.getFullYear() : ''}`; }
  function rangeLabel(s, e) {
    const sameYear = s.getFullYear() === e.getFullYear();
    return `${fmtDay(s, !sameYear)} – ${fmtDay(e, true)}`;
  }
  function makePeriod(start, end) {
    const s = new Date(start), e = new Date(end);
    const days = Math.max(1, Math.round((e - s) / DAY_MS) + 1);
    return { startMs: +s, endMs: +e, days, label: rangeLabel(s, e) };
  }
  function periodOfDays(days) { const e = new Date(ANCHOR); const s = new Date(ANCHOR); s.setDate(e.getDate() - (days - 1)); return makePeriod(s, e); }
  const PERIOD_PRESETS = [
    { key: 'Last 30 days', days: 30 }, { key: 'Last 3 months', days: 91 },
    { key: 'Last 6 months', days: 182 }, { key: 'Last 12 months', days: 365 },
  ].map((p) => ({ ...p, period: periodOfDays(p.days) }));

  // Map a date range to a whole number of recent months to sum.
  function monthsForPeriod(period) { const d = (period && period.days) || 30; return d <= 45 ? 1 : d <= 135 ? 3 : d <= 270 ? 6 : 12; }

  function forPeriod(period) {
    const n = monthsForPeriod(period);
    const cur = aggregate(NUM_MONTHS - n, NUM_MONTHS);
    const ps = Math.max(0, NUM_MONTHS - 2 * n), pe = NUM_MONTHS - n;
    const hasPrev = pe > ps;
    const prevAgg = hasPrev ? aggregate(ps, pe) : { cats: [] };
    const prev = {}; prevAgg.cats.forEach((c) => { prev[c.id] = c.total; });
    cur.cats.forEach((c) => { if (prev[c.id] == null) prev[c.id] = c.total; }); // no prior window → flat delta
    return { CATEGORY_SPEND: cur.cats, TOTAL: cur.total, PREV: prev, hasPrev, prevTotal: hasPrev ? prevAgg.total : null, TRANSACTIONS: windowTxns(NUM_MONTHS - n, NUM_MONTHS, 120), TXN_COUNT: cur.cats.reduce((s, c) => s + c.count, 0), months: n };
  }

  window.EXP_DATA = {
    CATEGORIES, BRANDS, CATEGORY_SPEND, TOTAL, PREV, TRANSACTIONS, MERCHANT_CAT, CARD_TYPE,
    MONTH_LABELS, MONTH_YEAR, NUM_MONTHS,
    txnsForCategory, txnsForBrand, txnsForCategoryMonth, categoryMonths, brandMonths, monthlyTotals,
    forPeriod, monthsForPeriod, PERIOD_PRESETS, makePeriod, periodOfDays, ANCHOR_MS: +ANCHOR,
    CURRENT_PERIOD: periodOfDays(30),
  };
  } // end build()

  window.BUILD_EXP_DATA = build;
  build('me');
})();

<script type="text/babel" data-presets="react">
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)

/* BEGIN USAGE */
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports (to window): IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard
//
// Usage — wrap your screen content in <IOSDevice> to get the bezel, status bar
// and home indicator (props: title, dark, keyboard):
//
//   <IOSDevice title="Settings">
//     ...your screen content...
//   </IOSDevice>
//   <IOSDevice dark title="Search" keyboard>…</IOSDevice>
/* END USAGE */

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';

    if (!open) return;
    clampToViewport();

      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }

    return () => ro.disconnect();

      else if (t === '__deactivate_edit_mode') setOpen(false);

    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

// Best-available logo sources, tried in order: Clearbit (real logos) →
// Google favicon @128 → brand monogram. Anything without a domain (ATM,
// Misc POS, Unclassified) goes straight to the monogram.
function logoSources(name) {
  const d = MERCHANT_DOMAIN[name];
  if (!d) return [];
  // logo.dev gives real high-res brand logos when a token is set (best);
  // otherwise Google favicons @256 (good for global brands) then icon.horse.
  const LOGODEV = (window.LOGODEV_TOKEN || '');
  const chain = [];
  if (LOGODEV) chain.push(`https://img.logo.dev/${d}?token=${LOGODEV}&size=128&format=png&retina=true`);
  chain.push(`https://www.google.com/s2/favicons?domain=${d}&sz=256`, `https://icon.horse/icon/${d}`);
  return chain;
}

// Logo image — tries each source in order (highest-quality first), advancing
// on error, and falls back to the brand monogram. DOM <img> loads reliably in
// the sandbox where programmatic Image() preloads do not.
function MerchantLogo({ name, size, radius, dark }) {
  const sources = logoSources(name);
  const [idx, setIdx] = React.useState(0);
  React.useEffect(() => { setIdx(0); }, [name]);
  const bg = brandColor(name);
  if (!sources.length || idx >= sources.length) {
    const light = NOON_YELLOW_TEXT.has(name);
    return (
      <div style={{
        width: size, height: size, borderRadius: size / 2, background: bg,
        display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,

    }}>
      <img src={sources[idx]} alt={name} onError={() => setIdx((i) => i + 1)}
        style={{ width: '78%', height: '78%', objectFit: 'contain', display: 'block' }} />
    </div>
  );
}

// Merchant avatar: real logo (logos on) OR neutral category fallback (logos off)
function MerchantMark({ name, glyph, catColor, size = 44, radius = 13, showLogos = true, dark = false }) {

}

// Category chip — circular tinted icon (matches the SDK's ExpenseBreakdownTile)
function CategoryMark({ glyph, color, size = 44, radius = 13, dark = false, solid = false }) {

// ── UI icons ────────────────────────────────────────────────────────
function UIIcon({ name, size = 20, stroke = 'currentColor', sw = 1.8 }) {
  const p = { fill: 'none', stroke, strokeWidth: sw, strokeLinecap: 'round', strokeLinejoin: 'round' };
  const g = {

    sparkles: <g {...p}><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3Z"/></g>,

  return <svg width={size} height={size} viewBox="0 0 24 24" style={{ display: 'block' }}>{g[name]}</svg>;
}

// hex + alpha helper
function hexA(hex, a) {
  const h = hex.replace('#', '');
  const n = parseInt(h.length === 3 ? h.split('').map((c) => c + c).join('') : h, 16);
  const r = (n >> 16) & 255, gr = (n >> 8) & 255, b = n & 255;
  return `rgba(${r},${gr},${b},${a})`;
}

// UAE Dirham currency symbol (official 2025 mark). Inline SVG, currentColor,
// baseline-aligned so it reads like a glyph before an amount.
// Currency mark for the ACTIVE region: the official UAE Dirham glyph for AED,

function Dirham({ size = 14, color = 'currentColor', style = {} }) {

    </svg>

}

<script type="text/babel" data-presets="react">
/* charts.jsx — breakdown visualisations.
   End-state is the BASE style (always correct size); entrance is a pure
   transform/opacity keyframe so layout never depends on JS timing.
   Hover/active states on donut, bars, stacked segments and trend columns. */

const { useState: chUseState } = React;

// Formats a base-unit amount in the ACTIVE region's currency: converts by the
// region's rate and respects its decimal convention (JPY = whole yen).
function fmtAED(n, withDec = false) {
  const R = window.CURRENT_REGION || {};
  const v0 = n * (R.rate || 1);
  const dec = R.dec === 0 ? 0 : (withDec ? 2 : 0);
  return Number(dec ? v0.toFixed(2) : Math.round(v0)).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

// ── DONUT (tap once → show share, tap selected slice again → open) ───
function Donut({ data, total, size = 200, thickness = 26, dark = false, onSlice, ink, muted }) {
  const [hover, setHover] = chUseState(null);  // desktop hover preview
  const [sel, setSel] = chUseState(null);      // tap selection
  const r = (size - thickness) / 2;
  const cx = size / 2, cy = size / 2;
  const C = 2 * Math.PI * r;
  let acc = 0;
  const gap = 0.012;
  const segs = data.map((d) => { const frac = d.total / total; const seg = { ...d, start: acc, frac }; acc += frac; return seg; });
  const activeId = sel != null ? sel : hover;
  const active = activeId != null ? segs.find((s) => s.id === activeId) : null;
  const tap = (id) => { if (sel === id) { onSlice && onSlice(id); } else { setSel(id); } };
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)', animation: 'donutIn .7s cubic-bezier(.22,1,.36,1) both' }}>
        {segs.map((s) => {
          const len = Math.max(0.0001, (s.frac - gap)) * C;
          const dim = activeId != null && activeId !== s.id;
          const isHot = activeId === s.id;
          return (
            <circle key={s.id} cx={cx} cy={cy} r={r} fill="none"
              stroke={s.color} strokeWidth={isHot ? thickness + 5 : thickness}
              strokeDasharray={`${len} ${C}`} strokeDashoffset={-s.start * C} strokeLinecap="round"
              opacity={dim ? 0.25 : 1}
              onClick={() => tap(s.id)}
              onMouseEnter={() => setHover(s.id)} onMouseLeave={() => setHover(null)}
              style={{ transition: 'opacity .2s, stroke-width .18s', cursor: onSlice ? 'pointer' : 'default' }} />
          );
        })}
      </svg>
      <div onClick={() => active && sel != null && onSlice && onSlice(active.id)} style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', pointerEvents: sel != null ? 'auto' : 'none', cursor: sel != null ? 'pointer' : 'default', padding: 26, textAlign: 'center' }}>
        <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: active ? active.color : muted, transition: 'color .2s', whiteSpace: 'nowrap', maxWidth: '100%', overflow: 'hidden', textOverflow: 'ellipsis' }}>
          {active ? active.name : 'Total spent'}
        </div>
        <div style={{ fontSize: size * 0.155, fontWeight: 680, color: ink, marginTop: 3, letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums' }}>
          {fmtAED(active ? active.total : total)}
        </div>
        <div style={{ fontSize: 11.5, fontWeight: 600, color: active ? active.color : muted, marginTop: 2, transition: 'color .2s' }}>
          {active ? `${Math.round(active.total / total * 100)}% · tap to open` : 'AED'}
        </div>
      </div>
    </div>
  );
}

// ── DONUT DIAL (Figma style: thin segmented ring, icon badges on the
//    ring, value labels radiating outward, total in the center) ───────
function DonutDial({ data, total, dark = false, ink, muted, surface, onSlice }) {
  const [sel, setSel] = chUseState(null);
  const W = 306, H = 248, cx = W / 2, cy = 122, R = 66, stroke = 7, badge = 28, gapDeg = 7;
  const ring = surface || (dark ? '#17181C' : '#fff');

  const sorted = [...data].sort((a, b) => b.total - a.total);
  const topN = sorted.slice(0, 5);
  const restTotal = sorted.slice(5).reduce((s, c) => s + c.total, 0);
  const segsData = restTotal > 0
    ? [...topN, { id: '__other', name: 'Other', color: dark ? '#5B6166' : '#AEB4B2', glyph: '__dots', total: restTotal, other: true }]
    : topN;

  const polar = (r, deg) => { const a = (deg - 90) * Math.PI / 180; return [cx + r * Math.cos(a), cy + r * Math.sin(a)]; };
  const arc = (r, s, e) => { const [sx, sy] = polar(r, s); const [ex, ey] = polar(r, e); const large = (e - s) > 180 ? 1 : 0; return `M ${sx} ${sy} A ${r} ${r} 0 ${large} 1 ${ex} ${ey}`; };

  let cum = 0;
  const segs = segsData.map((d) => { const sweep = (d.total / total) * 360; const seg = { ...d, start: cum, end: cum + sweep, mid: cum + sweep / 2 }; cum += sweep; return seg; });
  const active = sel != null ? segs.find((s) => s.id === sel) : null;
  const tap = (s) => { if (s.other) { onSlice && onSlice('__other'); return; } if (sel === s.id) { onSlice && onSlice(s.id); } else { setSel(s.id); } };

  return (
    <div style={{ position: 'relative', width: W, maxWidth: '100%', height: H, margin: '0 auto' }}>
      <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ overflow: 'visible' }}>
        {segs.map((s) => {
          const dim = sel != null && sel !== s.id;
          return (
            <path key={s.id} d={arc(R, s.start + gapDeg / 2, s.end - gapDeg / 2)} fill="none"
              stroke={s.color} strokeWidth={sel === s.id ? stroke + 3 : stroke} strokeLinecap="round"
              opacity={dim ? 0.28 : 1} onClick={() => tap(s)}
              style={{ transition: 'opacity .2s, stroke-width .18s', cursor: 'pointer' }} />
          );
        })}
        {segs.map((s) => {
          const [lx, ly] = polar(R + 16, s.mid);
          const c = Math.cos((s.mid - 90) * Math.PI / 180);
          const anchor = c > 0.25 ? 'start' : c < -0.25 ? 'end' : 'middle';
          const dx = anchor === 'start' ? 4 : anchor === 'end' ? -4 : 0;
          const dim = sel != null && sel !== s.id;
          return (
            <text key={'l' + s.id} x={lx + dx} y={ly + 3.5} textAnchor={anchor}
              fontSize="9.5" fontWeight="600" fill={ink} opacity={dim ? 0.3 : 0.82}
              style={{ fontVariantNumeric: 'tabular-nums' }}>{`AED ${fmtAED(s.total)}`}</text>
          );
        })}
      </svg>

      <div style={{ position: 'absolute', left: 0, right: 0, top: cy, transform: 'translateY(-50%)', textAlign: 'center', pointerEvents: 'none' }}>
        <div style={{ fontSize: 12, fontWeight: 580, color: active ? active.color : muted, letterSpacing: '0.01em', transition: 'color .2s' }}>{active ? active.name : 'Total Spend'}</div>
        <div style={{ fontSize: 22, fontWeight: 700, color: ink, marginTop: 3, letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums' }}>
          <span style={{ fontSize: 12, fontWeight: 600, color: muted, marginRight: 3 }}>AED</span>{fmtAED(active ? active.total : total)}
        </div>
        {active && <div style={{ fontSize: 11, fontWeight: 600, color: active.color, marginTop: 3 }}>{Math.round(active.total / total * 100)}% · tap to open</div>}
      </div>

      {segs.map((s) => {
        const [bx, by] = polar(R, s.mid);
        const dim = sel != null && sel !== s.id;
        return (
          <div key={'b' + s.id} onClick={() => tap(s)} style={{ position: 'absolute', left: bx, top: by, width: badge, height: badge, marginLeft: -badge / 2, marginTop: -badge / 2, opacity: dim ? 0.3 : 1, transition: 'opacity .2s', cursor: 'pointer' }}>
            <div style={{ width: badge, height: badge, borderRadius: badge / 2, boxShadow: `0 0 0 3px ${ring}` }}>
              {s.other
                ? <div style={{ width: badge, height: badge, borderRadius: badge / 2, background: s.color, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><UIIcon name="dots" size={16} stroke="#fff" /></div>
                : <CategoryMark glyph={s.glyph} color={s.color} size={badge} radius={badge / 2} solid />}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── HORIZONTAL RANKED BARS (tap once → show share, tap again → open) ─
// Ranked bars — stats (value + share, or a custom label) are ALWAYS visible;
// a single tap drills in (no reveal-first step) when onBar is provided.
function RankedBars({ data, total, dark = false, ink, muted, max, onBar }) {
  const [hover, setHover] = chUseState(null);
  const peak = max || Math.max(...data.map((d) => d.total)) || 1;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
      {data.map((d, i) => {
        const key = d.id ?? d.name;
        const pct = (d.total / peak) * 100;
        const share = total ? Math.round((d.total / total) * 100) : null;
        const hot = hover === key;
        return (
          <div key={key} className={onBar ? 'pressable-row' : undefined}
            onClick={() => onBar && onBar(d)}
            onMouseEnter={() => setHover(key)} onMouseLeave={() => setHover(null)}
            style={{ cursor: onBar ? 'pointer' : 'default', padding: '9px 10px', margin: '0 -10px', borderRadius: 12,
              display: 'flex', alignItems: 'center', gap: 11,
              background: hot ? (dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.035)') : 'transparent', transition: 'background .15s' }}>
            {d.logoName && (
              <MerchantMark name={d.logoName} glyph={d.glyph} catColor={d.color} showLogos={true} dark={dark} size={36} radius={11} />
            )}
            <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 7, gap: 10 }}>
              <span style={{ fontSize: 14.5, fontWeight: 560, color: ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', minWidth: 0 }}>{d.name}</span>
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, flexShrink: 0 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: ink, fontVariantNumeric: 'tabular-nums', display: 'inline-flex', alignItems: 'baseline', gap: 3 }}>
                  {d.label != null ? d.label : <React.Fragment><Dirham size={11} color="currentColor" />{fmtAED(d.total)}{share != null ? ' · ' + share + '%' : ''}</React.Fragment>}
                </span>
                {onBar && <span style={{ display: 'flex', marginRight: -2 }}><UIIcon name="chevR" size={13} stroke={muted} /></span>}
              </span>
            </div>
            <div style={{ height: 9, borderRadius: 999, background: dark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.05)', overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${pct}%`, background: d.color, borderRadius: 999,
                transformOrigin: 'left center', animation: `growX .6s cubic-bezier(.23,1,.32,1) ${i * 0.04}s both` }} />
            </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── STACKED SINGLE BAR + legend (hover highlights segment + legend) ─
function StackedBar({ data, total, dark = false, onSeg, ink, muted }) {
  const [hot, setHot] = chUseState(null);
  return (
    <div>
      <div style={{ display: 'flex', height: 46, borderRadius: 14, overflow: 'hidden', gap: 3 }}>
        {data.map((d, i) => {
          const pct = (d.total / total) * 100;
          const dim = hot != null && hot !== d.id;
          return (
            <div key={d.id} onClick={() => onSeg && onSeg(d.id)} title={d.name}
              onMouseEnter={() => setHot(d.id)} onMouseLeave={() => setHot(null)}
              style={{ width: `${pct}%`, background: d.color, height: '100%', borderRadius: 7, cursor: onSeg ? 'pointer' : 'default', minWidth: 4,
                opacity: dim ? 0.4 : 1, transition: 'opacity .18s', transformOrigin: 'left center', animation: `growX .7s cubic-bezier(.22,1,.36,1) ${i * 0.04}s both` }} />
          );
        })}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px 14px', marginTop: 16 }}>
        {data.map((d) => {
          const share = Math.round((d.total / total) * 100);
          const dim = hot != null && hot !== d.id;
          return (
            <div key={d.id} onClick={() => onSeg && onSeg(d.id)}
              onMouseEnter={() => setHot(d.id)} onMouseLeave={() => setHot(null)}
              style={{ display: 'flex', alignItems: 'center', gap: 9, cursor: onSeg ? 'pointer' : 'default', padding: '6px 8px', margin: '0 -8px', borderRadius: 9,
                background: hot === d.id ? (dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.035)') : 'transparent', opacity: dim ? 0.5 : 1, transition: 'opacity .18s, background .18s' }}>
              <span style={{ width: 9, height: 9, borderRadius: 3, background: d.color, flexShrink: 0 }} />
              <span style={{ fontSize: 13, color: ink, fontWeight: 520, flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{d.name}</span>
              <span style={{ fontSize: 12.5, color: muted, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{share}%</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── COLUMN TREND (clickable months + hover) ─────────────────────────
// Vertical bars with an explicit x-axis: a baseline the bars sit on, month
// ticks beneath it, and the value shown above the active (hover/selected) bar.
function ColumnTrend({ values, labels, color, dark = false, ink, muted, height = 120, onMonth, activeIdx, solid = false }) {
  const [hot, setHot] = chUseState(null);
  const peak = Math.max(...values) || 1;
  const barsH = height - 22;
  const axis = dark ? 'rgba(255,255,255,0.16)' : 'rgba(7,3,18,0.14)';
  const track = dark ? 'rgba(255,255,255,0.13)' : 'rgba(0,0,0,0.08)';
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 5, height: barsH, borderBottom: `1.5px solid ${axis}` }}>
        {values.map((v, i) => {
          const h = Math.max(3, (v / peak) * (barsH - 18));
          const active = hot === i || activeIdx === i;
          const dim = hot != null && hot !== i;
          const showVal = active || (hot == null && activeIdx == null && i === values.length - 1);
          return (
            <div key={i} onClick={() => onMonth && onMonth(i)}
              onMouseEnter={() => setHot(i)} onMouseLeave={() => setHot(null)}
              style={{ flex: 1, minWidth: 0, position: 'relative', display: 'flex', alignItems: 'flex-end', justifyContent: 'center', height: '100%', cursor: onMonth ? 'pointer' : 'default' }}>
              {showVal && <span style={{ position: 'absolute', top: -2, fontSize: 10, fontWeight: 700, color: ink, fontVariantNumeric: 'tabular-nums', whiteSpace: 'nowrap' }}>{fmtAED(v)}</span>}
              <div style={{ width: '100%', maxWidth: 28, height: h, borderRadius: '6px 6px 0 0', background: dim ? track : color, opacity: dim ? 0.75 : 1,
                transition: 'opacity .15s, background .15s', transformOrigin: 'bottom center', animation: `growY .7s cubic-bezier(.22,1,.36,1) ${i * 0.04}s both` }} />
            </div>
          );
        })}
      </div>
      <div style={{ display: 'flex', gap: 5, marginTop: 7 }}>
        {labels.map((l, i) => (
          <div key={i} style={{ flex: 1, minWidth: 0, textAlign: 'center', fontSize: 10, fontWeight: 540, color: (hot === i || activeIdx === i) ? ink : muted, transition: 'color .15s' }}>{l}</div>
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { Donut, DonutDial, RankedBars, StackedBar, ColumnTrend, fmtAED });

</script>

<script type="text/babel" data-presets="react">
/* ui.jsx — Lune theme tokens (from the design system) + shared primitives. */

function makeTheme(dark, accent) {
  return dark ? {
    dark: true, accent,
    // Lune ink canvas + raised aubergine surfaces
    bg: '#070312', surface: '#14101F', surfaceAlt: '#1B1528', sunken: '#0B0716',
    ink: '#FFFFFF', muted: '#B8B2C4', faint: 'rgba(255,255,255,0.07)',
    line: 'rgba(255,255,255,0.12)',
    cardShadow: '0 1px 0 rgba(255,255,255,0.03)',

    negInk: '#99F2AC', negBg: 'rgba(153,242,172,0.16)',  // spend down = mint (good)
    warnBg: '#FBDA7D', warnInk: '#5A4205',
  } : {
    dark: false, accent,
    // Lune light: cool neutral-25 canvas, white cards, teal ink
    bg: '#F7F9F8', surface: '#FFFFFF', surfaceAlt: '#EEF2F1', sunken: '#EEF2F1',
    ink: '#002E2A', muted: '#44524E', faint: 'rgba(7,3,18,0.05)',

    cardShadow: '0 1px 3px rgba(7,3,18,0.08), 0 1px 2px rgba(7,3,18,0.04)',

    radius: 24, radiusSm: 12,
    posInk: '#C2402F', posBg: 'rgba(242,96,118,0.10)',

}

// Scroll surface that fills the device content area
function Screen({ T, children, pad = true }) {
  return (
    <div style={{ minHeight: '100%', background: T.bg, color: T.ink, paddingBottom: 44 }}>

}

function Card({ T, children, style = {}, onClick, pad = 18 }) {
  return (
    <div onClick={onClick} style={{

function SectionTitle({ T, children, action, onAction }) {

        }}>{action}</button>

}

// Top app header with optional back + period selector
function AppHeader({ T, title, eyebrow, onBack, onPeriod, period, right, extra }) {

      <div style={{ display: 'flex', alignItems: 'center', gap: 12, minHeight: 40 }}>
        {onBack && (
          <button onClick={onBack} aria-label="Back" style={{
            width: 38, height: 38, borderRadius: 12, flexShrink: 0, cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',

          }}><UIIcon name="chevL" size={20} /></button>
        )}
        <div style={{ flex: 1, minWidth: 0 }}>
          {eyebrow && <div style={{ fontSize: 12.5, fontWeight: 600, color: T.muted, letterSpacing: '0.01em' }}>{eyebrow}</div>}

        </div>

}

function PeriodPill({ T, period, onClick, inline }) {
  return (
    <button onClick={onClick} style={{
      display: 'inline-flex', alignItems: 'center', gap: 7, cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0,
      background: T.surface, border: `1px solid ${T.line}`, borderRadius: 999,

      <UIIcon name="chevD" size={15} stroke={T.muted} />

}

// Transaction row
function TxnRow({ T, txn, showLogos, onClick, showCategory = true, divider }) {
  return (
    <div onClick={onClick} className={onClick ? 'pressable-row' : undefined} style={{ display: 'flex', alignItems: 'center', gap: 13, padding: '11px 0', cursor: onClick ? 'pointer' : 'default', position: 'relative' }}>
      <MerchantMark name={txn.merchant} glyph={txn.glyph} catColor={txn.categoryColor} showLogos={showLogos} dark={T.dark} size={42} radius={12} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 15, fontWeight: 560, color: T.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{txn.merchant}</div>
        <div style={{ fontSize: 12.5, color: T.muted, marginTop: 2 }}>{showCategory ? txn.category : txn.date}</div>
      </div>
      <div style={{ textAlign: 'right', flexShrink: 0 }}>
        <div style={{ fontSize: 15, fontWeight: 600, color: T.ink, fontVariantNumeric: 'tabular-nums' }}>
          <span style={{ display: 'inline-flex', color: T.muted, marginRight: 3 }}><Dirham size={11} color="currentColor" /></span>{fmtAED(txn.amount, true)}
        </div>
        <div style={{ fontSize: 11.5, color: T.muted, marginTop: 2 }}>{txn.day + ' ' + (txn.month || 'May')}</div>
      </div>
      {divider && <div style={{ position: 'absolute', left: 55, right: 0, bottom: 0, height: 1, background: T.faint }} />}

}

// Category tile — circular icon, title + amount, subtitle + percentage, progress bar
function CategoryRow({ T, cat, total, onClick, divider }) {
  const pct = total ? Math.min(Math.abs(cat.total) / Math.abs(total), 1) : 0;
  const pctText = (pct * 100).toFixed(1) + '%';
  return (
    <div onClick={onClick} style={{ display: 'flex', alignItems: 'flex-start', gap: 13, padding: '14px 0', cursor: 'pointer', position: 'relative' }}>
      <CategoryMark glyph={cat.glyph} color={cat.color} dark={T.dark} size={44} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 10 }}>
          <span style={{ fontSize: 15, fontWeight: 600, color: T.ink }}>{cat.name}</span>
          <span style={{ fontSize: 15, fontWeight: 600, color: T.ink, fontVariantNumeric: 'tabular-nums' }}><Dirham size={12} color="currentColor" style={{ marginRight: 3 }} />{fmtAED(cat.total)}</span>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 10, marginTop: 5 }}>
          <span style={{ fontSize: 12.5, color: T.muted }}>{cat.count} transactions</span>
          <span style={{ fontSize: 12.5, color: T.muted, fontVariantNumeric: 'tabular-nums' }}>{pctText}</span>

        <div style={{ height: 6, borderRadius: 4, background: hexA(cat.color, T.dark ? 0.22 : 0.15), overflow: 'hidden', marginTop: 8 }}>
          <div style={{ height: '100%', width: `${pct * 100}%`, background: cat.color, borderRadius: 4 }} />
        </div>
      </div>
      {divider && <div style={{ position: 'absolute', left: 57, right: 0, bottom: 0, height: 1, background: T.faint }} />}
    </div>

}

// Bottom sheet
function Sheet({ T, open, onClose, children, title, height = 'auto', z = 200 }) {
  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: z, pointerEvents: open ? 'auto' : 'none' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.4)', opacity: open ? 1 : 0, transition: 'opacity .3s' }} />
      <div style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, background: T.bg,
        borderTopLeftRadius: 28, borderTopRightRadius: 28, maxHeight: '88%', height,
        transform: open ? 'translateY(0)' : 'translateY(102%)',
        transition: 'transform .42s cubic-bezier(.22,1,.36,1)',

        boxShadow: '0 -10px 40px rgba(0,0,0,0.25)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 18px 10px' }}>
          <div style={{ fontSize: 18, fontWeight: 680, color: T.ink, letterSpacing: '-0.02em' }}>{title}</div>

          </button>
        </div>
        <div style={{ overflow: 'auto', padding: '0 18px 26px' }}>{children}</div>
      </div>

}

// Segmented sort control
function SortBar({ T, value, dir, onChange }) {
  const opt = (key, label) => {
    const active = value === key;
    return (
      <button onClick={() => onChange(key)} style={{
        display: 'inline-flex', alignItems: 'center', gap: 5, cursor: 'pointer',
        border: `1px solid ${active ? 'transparent' : T.line}`, borderRadius: 999, padding: '7px 13px',
        background: active ? T.accent : T.surface, color: active ? '#fff' : T.ink,
        fontSize: 13, fontWeight: 580,
      }}>
        {label}
        {active && <span style={{ display: 'flex' }}><UIIcon name={dir === 'asc' ? 'arrowUp' : 'arrowDn'} size={14} stroke="#fff" /></span>}
      </button>
    );
  };
  return <div style={{ display: 'flex', gap: 9 }}>{opt('name', 'Name')}{opt('spend', 'Avg spend')}</div>;
}

Object.assign(window, { makeTheme, Screen, Card, SectionTitle, AppHeader, PeriodPill, TxnRow, CategoryRow, Sheet, SortBar });

</script>

<script type="text/babel" data-presets="react">
/* feedback.jsx — the enrichment feedback loop + drill-down list sheets.
   Constraint: the PFM cannot split or directly re-categorise a transaction.
   So this is a SUGGESTION loop ("improve brand name or category") that feeds
   Lune's enrichment — framed clearly as feedback, not an instant edit. */

const { useState: fbUseState, useEffect: fbUseEffect } = React;

// Reusable: generic transaction list in a sheet (month drill, brand drill)
function TxnListSheet({ T, open, onClose, title, subtitle, txns, showLogos, onTxn, z = 210, total }) {
  const sum = total != null ? total : (txns || []).reduce((s, t) => s + t.amount, 0);
  return (
    <Sheet T={T} open={open} onClose={onClose} title={title} z={z}>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', margin: '-2px 2px 14px' }}>
        <span style={{ fontSize: 13.5, color: T.muted, fontWeight: 540 }}>{subtitle}</span>
        <span style={{ fontSize: 14, color: T.ink, fontWeight: 640, fontVariantNumeric: 'tabular-nums' }}><Dirham size={12} color="currentColor" style={{ marginRight: 3 }} />{fmtAED(sum)}</span>
      </div>
      <Card T={T} pad="2px 18px">
        {(txns || []).map((t, i, a) => (
          <TxnRow key={t.id} T={T} txn={t} showLogos={showLogos} onClick={() => onTxn && onTxn(t)} divider={i < a.length - 1} />
        ))}
        {(!txns || txns.length === 0) && <div style={{ padding: '26px 0', textAlign: 'center', color: T.muted, fontSize: 14 }}>No transactions</div>}
      </Card>
    </Sheet>
  );
}

// Category picker grid (also used as the "right category" step)
function CategoryGrid({ T, selectedId, onPick }) {
  const { CATEGORIES } = window.EXP_DATA;
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
      {CATEGORIES.map((c) => {
        const on = selectedId === c.id;
        return (
          <button key={c.id} onClick={() => onPick(c.id)} style={{
            display: 'flex', alignItems: 'center', gap: 11, cursor: 'pointer', textAlign: 'left',
            padding: '12px 13px', borderRadius: 15, background: on ? hexA(c.color, T.dark ? 0.22 : 0.12) : T.surface,
            border: `1.5px solid ${on ? c.color : T.line}`, color: T.ink, transition: 'all .15s',
          }}>
            <CategoryMark glyph={c.glyph} color={c.color} dark={T.dark} size={34} radius={10} />
            <span style={{ fontSize: 13.5, fontWeight: 560, lineHeight: 1.15 }}>{c.name}</span>

// The feedback loop visual (You flag → Lune reviews → Everyone benefits)
function LoopDiagram({ T }) {
  const node = (icon, label, sub, hot) => (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', gap: 8 }}>
      <div style={{ width: 46, height: 46, borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'center',

      <div>
        <div style={{ fontSize: 12.5, fontWeight: 620, color: T.ink }}>{label}</div>

      </div>

  );
  const arrow = <div style={{ width: 22, paddingTop: 14, color: T.muted, flexShrink: 0, display: 'flex', justifyContent: 'center' }}><UIIcon name="chevR" size={16} stroke={T.muted} /></div>;
  // Lune reviews node uses the brand moon mark on a soft emerald disc
  const luneNode = (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', gap: 8 }}>
      <div style={{ width: 46, height: 46, borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', background: hexA(T.accent, T.dark ? 0.2 : 0.12) }}>
        <LuneMark size={26} disc={T.dark ? '#FFFFFF' : '#002E2A'} crescent={T.accent} />
      </div>
      <div>
        <div style={{ fontSize: 12.5, fontWeight: 620, color: T.ink }}>Lune reviews</div>
        <div style={{ fontSize: 11, color: T.muted, marginTop: 1 }}>~48 hrs</div>
      </div>

  return (

      {node(<UIIcon name="sparkles" size={22} stroke="currentColor" />, 'You flag it', 'Just now', true)}
      {arrow}
      {luneNode}
      {arrow}
      {node(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 19a6 6 0 0 1 12 0"/><path d="M16 6a3 3 0 0 1 0 6M21 19a6 6 0 0 0-5-5.9"/></svg>, 'Everyone benefits', 'Rolls out', false)}
    </div>
  );
}

function FeedbackSheet({ T, txn, open, onClose, showLogos }) {
  const [step, setStep] = fbUseState('choose');
  const [field, setField] = fbUseState(null);
  const [name, setName] = fbUseState('');
  const [catId, setCatId] = fbUseState(null);
  const [logoImg, setLogoImg] = fbUseState(null);

  fbUseEffect(() => {
    if (open && txn) { setStep('choose'); setField(null); setName(txn.merchant); setCatId(txn.categoryId); setLogoImg(null); }
  }, [open, txn && txn.id]);

  if (!txn) return <Sheet T={T} open={open} onClose={onClose} title="Improve this" z={400} />;
  const cat = window.EXP_DATA.CATEGORIES.find((c) => c.id === txn.categoryId);
  const accentSoft = hexA(T.accent, T.dark ? 0.16 : 0.1);

  const titleFor = { choose: 'Improve this', brand: 'Improve brand name', category: 'Improve category', logo: 'Improve brand logo', done: 'Thank you' }[step];

  return (
    <Sheet T={T} open={open} onClose={onClose} title={titleFor} z={400}>
      {step === 'choose' && (
        <div key="choose" style={{ animation: 'popIn .3s ease both' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 13, padding: '6px 0 16px' }}>
            <MerchantMark name={txn.merchant} glyph={txn.glyph} catColor={txn.categoryColor} showLogos={showLogos} dark={T.dark} size={48} radius={14} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 16, fontWeight: 620, color: T.ink }}>{txn.merchant}</div>
              <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, marginTop: 4, fontSize: 12.5, color: cat.color, fontWeight: 560, background: hexA(cat.color, T.dark ? 0.2 : 0.1), padding: '3px 9px', borderRadius: 999 }}>
                <CatGlyph glyph={cat.glyph} size={13} color={cat.color} />{cat.name}
              </div>
            </div>
          </div>
          <p style={{ fontSize: 13.5, lineHeight: 1.5, color: T.muted, margin: '0 0 18px' }}>
            Spotted something off? Suggest a better <b style={{ color: T.ink }}>brand name</b>, <b style={{ color: T.ink }}>logo</b> or <b style={{ color: T.ink }}>category</b>. Your feedback trains Lune's enrichment — it won't change this transaction right away.
          </p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <FbOption T={T} icon="sparkles" label="Improve brand name" value={txn.merchant} onClick={() => { setField('brand'); setStep('brand'); }} />
            <FbOption T={T} icon="image" label="Improve brand logo" value={showLogos ? 'Logo shown' : 'Using fallback'} onClick={() => { setField('logo'); setStep('logo'); }} />
            <FbOption T={T} icon="filter" label="Improve category" value={cat.name} onClick={() => { setField('category'); setStep('category'); }} />
          </div>
          <button onClick={onClose} style={ghostBtn(T)}>Everything looks right</button>
        </div>
      )}

      {step === 'brand' && (
        <div key="brand" style={{ animation: 'popIn .3s ease both' }}>
          <Labeled T={T} label="Lune detected">
            <div style={{ display: 'flex', alignItems: 'center', gap: 11 }}>
              <MerchantMark name={txn.merchant} glyph={txn.glyph} catColor={txn.categoryColor} showLogos={showLogos} dark={T.dark} size={38} radius={11} />
              <span style={{ fontSize: 15, fontWeight: 560, color: T.ink }}>{txn.merchant}</span>
            </div>
          </Labeled>
          <div style={{ fontSize: 13, fontWeight: 600, color: T.muted, margin: '20px 2px 9px' }}>What should it be called?</div>
          <input value={name} onChange={(e) => setName(e.target.value)} autoFocus placeholder="Correct brand name"
            style={{ width: '100%', boxSizing: 'border-box', padding: '14px 15px', borderRadius: 14, border: `1.5px solid ${T.accent}`, background: T.surface, color: T.ink, fontSize: 16, fontFamily: 'inherit', outline: 'none' }} />
          <div style={{ fontSize: 12, color: T.muted, margin: '12px 2px 0', lineHeight: 1.5 }}>e.g. a clearer display name, correct spelling, or the real merchant behind a payment processor.</div>
          <button disabled={!name.trim() || name.trim() === txn.merchant} onClick={() => setStep('done')} style={primaryBtn(T, !name.trim() || name.trim() === txn.merchant)}>Submit suggestion</button>
          <button onClick={() => setStep('choose')} style={ghostBtn(T)}>Back</button>
        </div>
      )}

      {step === 'category' && (
        <div key="category" style={{ animation: 'popIn .3s ease both' }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: T.muted, margin: '2px 2px 12px' }}>Which category fits best?</div>
          <CategoryGrid T={T} selectedId={catId} onPick={setCatId} />
          <button disabled={catId === txn.categoryId} onClick={() => setStep('done')} style={primaryBtn(T, catId === txn.categoryId)}>Submit suggestion</button>
          <button onClick={() => setStep('choose')} style={ghostBtn(T)}>Back</button>
        </div>
      )}

      {step === 'logo' && (
        <div key="logo" style={{ animation: 'popIn .3s ease both' }}>
          <Labeled T={T} label="Current logo">
            <div style={{ display: 'flex', alignItems: 'center', gap: 11 }}>
              <MerchantMark name={txn.merchant} glyph={txn.glyph} catColor={txn.categoryColor} showLogos={showLogos} dark={T.dark} size={38} radius={11} />
              <span style={{ fontSize: 15, fontWeight: 560, color: T.ink }}>{txn.merchant}</span>
            </div>
          </Labeled>
          <div style={{ fontSize: 13, fontWeight: 600, color: T.muted, margin: '20px 2px 9px' }}>Suggest the correct logo</div>
          <label style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 10, cursor: 'pointer',
            border: `1.5px dashed ${logoImg ? T.accent : T.line}`, borderRadius: 16, padding: '22px 16px', background: T.surface, textAlign: 'center' }}>
            {logoImg ? (
              <img src={logoImg} alt="Suggested logo" style={{ width: 64, height: 64, borderRadius: 14, objectFit: 'cover' }} />
            ) : (
              <span style={{ width: 48, height: 48, borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', background: hexA(T.accent, T.dark ? 0.18 : 0.1), color: T.accent }}>
                <UIIcon name="image" size={24} stroke={T.accent} />
              </span>
            )}
            <span style={{ fontSize: 14, fontWeight: 600, color: T.ink }}>{logoImg ? 'Tap to change image' : 'Upload the brand logo'}</span>
            <span style={{ fontSize: 12, color: T.muted }}>PNG or SVG · or a clear photo of the storefront</span>
            <input type="file" accept="image/*" style={{ display: 'none' }} onChange={(e) => {
              const f = e.target.files && e.target.files[0];
              if (f) { const r = new FileReader(); r.onload = (ev) => setLogoImg(ev.target.result); r.readAsDataURL(f); }
            }} />
          </label>
          <button disabled={!logoImg} onClick={() => setStep('done')} style={primaryBtn(T, !logoImg)}>Submit logo</button>
          <button onClick={() => setStep('choose')} style={ghostBtn(T)}>Back</button>
        </div>
      )}

      {step === 'done' && (
        <div key="done" style={{ animation: 'popIn .35s ease both', paddingBottom: 4 }}>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', padding: '4px 0 22px' }}>
            <svg width="62" height="62" viewBox="0 0 62 62">
              <circle cx="31" cy="31" r="29" fill="none" stroke={accentSoft} strokeWidth="3" />
              <circle cx="31" cy="31" r="29" fill="none" stroke={T.accent} strokeWidth="3" strokeLinecap="round" strokeDasharray="220" style={{ animation: 'ringDraw .7s cubic-bezier(.22,1,.36,1) both' }} transform="rotate(-90 31 31)" />
              <path d="M20 31l8 8 15-16" fill="none" stroke={T.accent} strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
            <div style={{ fontSize: 20, fontWeight: 700, color: T.ink, marginTop: 16, letterSpacing: '-0.02em' }}>Thanks, Layla</div>
            <p style={{ fontSize: 13.5, lineHeight: 1.55, color: T.muted, margin: '8px 6px 0' }}>
              {field === 'brand'
                ? <>We'll review renaming <b style={{ color: T.ink }}>{txn.merchant}</b> to <b style={{ color: T.ink }}>“{name.trim()}”</b>.</>
                : field === 'logo'
                ? <>We'll review the new logo you suggested for <b style={{ color: T.ink }}>{txn.merchant}</b>.</>
                : <>We'll review moving this to <b style={{ color: T.ink }}>{window.EXP_DATA.CATEGORIES.find((c) => c.id === catId).name}</b>.</>}
              {' '}Verified improvements roll out to everyone — not just you.
            </p>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 7, marginTop: 14, fontSize: 12.5, fontWeight: 600, color: T.accent, background: accentSoft, padding: '6px 13px', borderRadius: 999 }}>
              <span style={{ width: 7, height: 7, borderRadius: 999, background: T.accent }} />Submitted · Under review
            </div>
          </div>
          <Card T={T} pad="16px 16px">
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16, justifyContent: 'center' }}>
              <LuneMark size={16} disc={T.dark ? '#FFFFFF' : '#002E2A'} crescent={T.accent} />
              <span style={{ fontSize: 11.5, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: T.muted }}>How Lune uses your feedback</span>
            </div>
            <LoopDiagram T={T} />
          </Card>
          <button onClick={onClose} style={primaryBtn(T, false)}>Done</button>
        </div>
      )}
    </Sheet>
  );
}

function FbOption({ T, icon, label, value, onClick }) {
  return (
    <button onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 13, width: '100%', cursor: 'pointer', textAlign: 'left',
      padding: '14px 15px', borderRadius: 15, background: T.surface, border: `1px solid ${T.line}`, color: T.ink, boxShadow: T.dark ? 'none' : T.cardShadow }}>
      <span style={{ width: 38, height: 38, borderRadius: 11, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: hexA(T.accent, T.dark ? 0.18 : 0.1), color: T.accent }}>
        <UIIcon name={icon} size={20} stroke={T.accent} />
      </span>
      <span style={{ flex: 1, minWidth: 0 }}>
        <span style={{ display: 'block', fontSize: 15, fontWeight: 580 }}>{label}</span>
        <span style={{ display: 'block', fontSize: 12.5, color: T.muted, marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>Now: {value}</span>
      </span>
      <UIIcon name="chevR" size={18} stroke={T.muted} />
    </button>

}

function Labeled({ T, label, children }) {
  return (
    <div>
      <div style={{ fontSize: 11.5, fontWeight: 600, letterSpacing: '0.04em', textTransform: 'uppercase', color: T.muted, margin: '2px 2px 9px' }}>{label}</div>
      <Card T={T} pad="13px 15px">{children}</Card>

}

function primaryBtn(T, disabled) {
  return { width: '100%', marginTop: 18, padding: '15px 0', borderRadius: 15, border: 'none', cursor: disabled ? 'default' : 'pointer',
    background: disabled ? (T.dark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)') : T.accent, color: disabled ? T.muted : '#fff', fontSize: 15.5, fontWeight: 640, fontFamily: 'inherit' };
}
function ghostBtn(T) {
  return { width: '100%', marginTop: 10, padding: '13px 0', borderRadius: 15, border: 'none', cursor: 'pointer', background: 'transparent', color: T.muted, fontSize: 14.5, fontWeight: 560, fontFamily: 'inherit' };
}

Object.assign(window, { FeedbackSheet, TxnListSheet, CategoryGrid, LoopDiagram });

</script>


<script type="text/babel" data-presets="react">
/* shared-sheets.jsx — reused verbatim from the SDK prototype:
   search field, transaction detail sheet (feedback entry), date-range picker. */

function SearchField({ T, value, onChange, placeholder }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, background: T.surface, border: `1px solid ${T.line}`,
      borderRadius: 14, padding: '11px 14px', boxShadow: T.dark ? 'none' : T.cardShadow }}>
      <UIIcon name="search" size={18} stroke={T.muted} />
